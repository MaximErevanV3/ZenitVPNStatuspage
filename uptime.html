<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenitVPN — Графики Uptime</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #04060f;
            --surface: rgba(8, 12, 26, 0.7);
            --surface-raised: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
            --border-strong: rgba(255,255,255,0.14);
            --green: #00dda0;
            --yellow: #ffb020;
            --red: #ff3358;
            --blue: #4da6ff;
            --text-1: #eef2ff;
            --text-2: #8892aa;
            --text-3: #4a4f6a;
            --card-shadow: 0 30px 80px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05) inset;
        }

        body.light-theme {
            --bg: #f0f2f5;
            --surface: rgba(255,255,255,0.85);
            --surface-raised: rgba(0,0,0,0.03);
            --border: rgba(0,0,0,0.08);
            --border-strong: rgba(0,0,0,0.15);
            --green: #00a878;
            --yellow: #d48c00;
            --red: #c62828;
            --blue: #2563eb;
            --text-1: #1a1a2e;
            --text-2: #4a4a6a;
            --text-3: #6b6b8a;
            --card-shadow: 0 20px 50px rgba(0,0,0,0.1), 0 0 0 1px rgba(0,0,0,0.04) inset;
        }

        *{box-sizing:border-box;margin:0;padding:0}
        body{
            background:var(--bg);color:var(--text-1);
            font-family:'Inter',system-ui,sans-serif;
            min-height:100vh;display:flex;align-items:center;justify-content:center;
            padding:24px;transition:background 0.4s,color 0.4s;
            position:relative;
        }
        body::after {
            content: '';
            position: fixed;inset: 0;z-index: 0;pointer-events: none;
            background: 
                radial-gradient(circle at 20% 30%, rgba(77,166,255,0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0,221,160,0.1) 0%, transparent 50%),
                radial-gradient(circle at 60% 80%, rgba(255,51,88,0.08) 0%, transparent 50%);
            animation: gradientMove 20s ease-in-out infinite alternate;
        }
        @keyframes gradientMove {
            0% { transform: scale(1) translate(0,0); }
            100% { transform: scale(1.2) translate(-20px,10px); }
        }
        .container{
            width:100%;max-width:700px;position:relative;z-index:1;
            animation: fadeInUp 0.8s cubic-bezier(0.22,1,0.36,1) both;
        }
        @keyframes fadeInUp {
            from { opacity:0; transform:translateY(40px); filter:blur(10px); }
            to { opacity:1; transform:translateY(0); filter:blur(0); }
        }
        .back-link{
            display:inline-flex;align-items:center;gap:6px;margin-bottom:22px;
            color:var(--blue);text-decoration:none;font-size:13.5px;font-weight:600;
            transition:opacity 0.2s;
        }
        .back-link:hover{opacity:0.7}
        .card{
            background:var(--surface);border:1px solid var(--border);border-radius:24px;
            backdrop-filter:blur(80px);-webkit-backdrop-filter:blur(80px);
            padding:38px 42px 34px;box-shadow:var(--card-shadow);
            transition:background 0.4s;
        }
        h2{font-size:24px;font-weight:800;margin-bottom:20px;color:var(--text-1)}
        .period-selector{
            display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap;
        }
        .period-btn{
            background:var(--surface-raised);
            border:1px solid var(--border);
            color:var(--text-2);
            padding:8px 16px;border-radius:10px;
            font-size:13px;font-weight:600;
            cursor:pointer;transition:all 0.3s;
            font-family:'Inter',sans-serif;
        }
        .period-btn.active{
            background:var(--blue);color:white;border-color:var(--blue);
        }
        .period-btn:hover{
            border-color:var(--border-strong);
        }
        .chart-wrapper{
            position:relative;
            height:320px;
            margin-bottom:28px;
            background:var(--surface-raised);
            border-radius:16px;
            padding:16px;
            border:1px solid var(--border);
        }
        .chart-wrapper canvas{
            filter:drop-shadow(0 4px 12px rgba(0,0,0,0.4));
        }
        .stats-row{
            display:grid;grid-template-columns:repeat(3,1fr);
            gap:16px;margin-bottom:20px;
        }
        .stat-card{
            background:var(--surface-raised);
            border:1px solid var(--border);
            border-radius:14px;padding:16px;
            text-align:center;
            transition:transform 0.3s;
        }
        .stat-card:hover{
            transform:translateY(-2px);
        }
        .stat-card .node-name{
            font-size:13px;font-weight:600;
            color:var(--text-1);margin-bottom:8px;
        }
        .stat-card .uptime-value{
            font-size:28px;font-weight:800;
        }
        .theme-toggle{
            background:transparent;border:1px solid var(--border);border-radius:13px;
            width:38px;height:38px;display:flex;align-items:center;justify-content:center;
            cursor:pointer;color:var(--text-2);font-size:19px;transition:all 0.4s;margin-left:12px;
        }
        .theme-toggle:hover{background:var(--surface-raised);border-color:var(--border-strong);transform:rotate(20deg) scale(1.08)}
        @media(max-width:580px){
            .card{padding:30px 24px 24px}
            .stats-row{grid-template-columns:1fr}
            .chart-wrapper{height:240px}
        }
    </style>
</head>
<body>
<div class="container">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px;">
        <a href="index.html" class="back-link">← На главную</a>
        <button id="themeToggleBtn" class="theme-toggle" title="Переключить тему">🌙</button>
    </div>
    <div class="card">
        <h2>Uptime по узлам</h2>
        <div class="period-selector">
            <button class="period-btn active" data-days="30">30 дней</button>
            <button class="period-btn" data-days="60">60 дней</button>
            <button class="period-btn" data-days="90">90 дней</button>
        </div>
        <div class="chart-wrapper">
            <canvas id="uptimeChart"></canvas>
        </div>
        <div class="stats-row">
            <div class="stat-card">
                <div class="node-name">🇫🇮 Финляндия</div>
                <div class="uptime-value" id="uptime-node1" style="color:#4da6ff">—</div>
            </div>
            <div class="stat-card">
                <div class="node-name">🇳🇱 Нидерланды</div>
                <div class="uptime-value" id="uptime-node2" style="color:#ffb020">—</div>
            </div>
            <div class="stat-card">
                <div class="node-name">🇫🇷 Франция</div>
                <div class="uptime-value" id="uptime-node3" style="color:#00dda0">—</div>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    const SUPABASE_ANON_KEY = 'sb_publishable_v7HvLsYBsknR6LbMZmEDNA_Di32JcCk';
    const PROXY_URLS = [
        'https://vuzcudxulhqkrkniulsl.supabase.co',
        'https://zenitvpn-proxy.cloudzenit.workers.dev',
        'https://corsproxy.io/?' + encodeURIComponent('https://vuzcudxulhqkrkniulsl.supabase.co')
    ];

    // Тема
    function applyTheme(theme) {
        if (theme === 'light') { document.body.classList.add('light-theme'); }
        else { document.body.classList.remove('light-theme'); }
        localStorage.setItem('zenitvpn_theme', theme);
        updateThemeIcon(theme);
        if (chartInstance) updateChartTheme();
    }
    function toggleTheme() {
        const isLight = document.body.classList.contains('light-theme');
        applyTheme(isLight ? 'dark' : 'light');
    }
    function updateThemeIcon(theme) {
        const btn = document.getElementById('themeToggleBtn');
        if (btn) btn.textContent = theme === 'light' ? '☀️' : '🌙';
    }
    function initTheme() {
        const saved = localStorage.getItem('zenitvpn_theme') || 'dark';
        applyTheme(saved);
    }

    // Прокси
    async function findWorkingUrl() {
        for (let url of PROXY_URLS) {
            try {
                let resp = await fetch(url + '/rest/v1/', { method: 'HEAD', signal: AbortSignal.timeout(5000) });
                if (resp.ok || resp.status === 401 || resp.status === 400 || resp.status === 403) return url;
            } catch (e) {}
        }
        return PROXY_URLS[0];
    }

    async function fetchIncidents(days) {
        const since = new Date();
        since.setDate(since.getDate() - days);
        const workingUrl = await findWorkingUrl();
        const supabase = window.supabase.createClient(workingUrl, SUPABASE_ANON_KEY);
        const { data, error } = await supabase.from('incidents')
            .select('*')
            .gte('created_at', since.toISOString())
            .order('created_at', { ascending: true });
        if (error) { console.error('Ошибка загрузки инцидентов:', error); return []; }
        return data || [];
    }

    function calculateUptime(incidents, days) {
        const now = new Date();
        const result = {
            node1: { up: 0, total: 0, daily: [] },
            node2: { up: 0, total: 0, daily: [] },
            node3: { up: 0, total: 0, daily: [] },
            labels: []
        };
        const dateList = [];
        for (let i = days - 1; i >= 0; i--) {
            const d = new Date(now);
            d.setDate(d.getDate() - i);
            d.setHours(0,0,0,0);
            dateList.push(d);
        }
        dateList.forEach(date => {
            const dayStart = new Date(date);
            const dayEnd = new Date(date);
            dayEnd.setDate(dayEnd.getDate() + 1);
            const dayIncidents = incidents.filter(inc => {
                const incDate = new Date(inc.created_at);
                return incDate >= dayStart && incDate < dayEnd;
            });
            const statuses = { node1: 'online', node2: 'online', node3: 'online' };
            dayIncidents.forEach(inc => {
                if (inc.affected_nodes) {
                    for (let node of ['node1','node2','node3']) {
                        const nodeStatus = inc.affected_nodes[node];
                        if (nodeStatus && nodeStatus !== 'online') {
                            statuses[node] = nodeStatus;
                        }
                    }
                }
            });
            ['node1','node2','node3'].forEach(id => {
                const isUp = statuses[id] === 'online';
                result[id].daily.push(isUp ? 1 : 0);
                if (isUp) result[id].up++;
                result[id].total++;
            });
            result.labels.push(date.toLocaleDateString('ru-RU', { day:'numeric', month:'short' }));
        });
        return result;
    }

    let chartInstance = null;

    function getComputedColor(varName) {
        return getComputedStyle(document.body).getPropertyValue(varName).trim() || '#000';
    }

    function createGradient(ctx, color) {
        const gradient = ctx.createLinearGradient(0, 0, 0, 320);
        gradient.addColorStop(0, color + '40');
        gradient.addColorStop(1, color + '00');
        return gradient;
    }

    function renderChart(data) {
        const canvas = document.getElementById('uptimeChart');
        const ctx = canvas.getContext('2d');
        if (chartInstance) chartInstance.destroy();

        const blue = '#4da6ff';
        const yellow = '#ffb020';
        const green = '#00dda0';

        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.labels,
                datasets: [
                    {
                        label: 'Финляндия',
                        data: data.node1.daily,
                        borderColor: blue,
                        backgroundColor: createGradient(ctx, blue),
                        tension: 0.3,
                        pointRadius: 0,
                        pointHoverRadius: 5,
                        borderWidth: 2.5,
                        fill: true
                    },
                    {
                        label: 'Нидерланды',
                        data: data.node2.daily,
                        borderColor: yellow,
                        backgroundColor: createGradient(ctx, yellow),
                        tension: 0.3,
                        pointRadius: 0,
                        pointHoverRadius: 5,
                        borderWidth: 2.5,
                        fill: true
                    },
                    {
                        label: 'Франция',
                        data: data.node3.daily,
                        borderColor: green,
                        backgroundColor: createGradient(ctx, green),
                        tension: 0.3,
                        pointRadius: 0,
                        pointHoverRadius: 5,
                        borderWidth: 2.5,
                        fill: true
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: {
                    duration: 800,
                    easing: 'easeOutQuart'
                },
                plugins: {
                    legend: {
                        labels: {
                            color: 'var(--text-2)',
                            font: { family: 'Inter', size: 12 },
                            usePointStyle: true,
                            pointStyleWidth: 8
                        }
                    },
                    tooltip: {
                        backgroundColor: 'rgba(8, 12, 26, 0.9)',
                        titleColor: 'var(--text-1)',
                        bodyColor: 'var(--text-2)',
                        borderColor: 'var(--border-strong)',
                        borderWidth: 1,
                        cornerRadius: 10,
                        padding: 12,
                        titleFont: { family: 'Inter', weight: '600' },
                        bodyFont: { family: 'JetBrains Mono' },
                        callbacks: {
                            label: (ctx) => {
                                const value = ctx.parsed.y;
                                return `${ctx.dataset.label}: ${value === 1 ? 'Online' : 'Проблемы'}`;
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        ticks: { color: 'var(--text-3)', font: { family: 'JetBrains Mono', size: 10 } },
                        grid: { color: 'rgba(255,255,255,0.05)' }
                    },
                    y: {
                        min: 0,
                        max: 1.2,
                        ticks: {
                            color: 'var(--text-3)',
                            callback: (value) => value === 1 ? 'Online' : value === 0 ? 'Off' : '',
                            stepSize: 1,
                            font: { family: 'JetBrains Mono', size: 10 }
                        },
                        grid: { color: 'rgba(255,255,255,0.05)' }
                    }
                },
                interaction: { intersect: false, mode: 'index' }
            }
        });

        for (let node of ['node1','node2','node3']) {
            const pct = ((data[node].up / data[node].total) * 100).toFixed(1);
            document.getElementById(`uptime-${node}`).textContent = `${pct}%`;
        }
    }

    function updateChartTheme() {
        if (!chartInstance) return;
        chartInstance.options.plugins.legend.labels.color = getComputedStyle(document.body).getPropertyValue('--text-2');
        chartInstance.options.scales.x.ticks.color = getComputedStyle(document.body).getPropertyValue('--text-3');
        chartInstance.options.scales.y.ticks.color = getComputedStyle(document.body).getPropertyValue('--text-3');
        chartInstance.update();
    }

    async function loadPeriod(days) {
        const incidents = await fetchIncidents(days);
        const uptimeData = calculateUptime(incidents, days);
        renderChart(uptimeData);
    }

    initTheme();
    document.getElementById('themeToggleBtn').addEventListener('click', toggleTheme);

    const buttons = document.querySelectorAll('.period-btn');
    buttons.forEach(btn => {
        btn.addEventListener('click', () => {
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const days = parseInt(btn.dataset.days);
            loadPeriod(days);
        });
    });

    loadPeriod(30);
})();
</script>
</body>
</html>
