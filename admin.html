<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenitVPN — Админ‑панель</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #04060f; --surface: #0c1226; --border: #1a223a;
            --text: #dce3f0; --text-secondary: #8892aa; --accent: #4da6ff;
            --red: #ff3358; --green: #00dda0; --yellow: #ffb020; --orange: #ff8c42;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif;
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
        }
        body::before {
            content: ''; position: fixed; inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
            pointer-events: none; z-index: 0;
        }
        .container { width: 100%; max-width: 800px; position: relative; z-index: 1; }
        .card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 18px;
            padding: 32px; backdrop-filter: blur(40px); box-shadow: 0 40px 100px rgba(0,0,0,0.6); margin-bottom: 24px;
        }
        h2 { font-size: 18px; font-weight: 700; margin-bottom: 24px; color: white; display: flex; align-items: center; gap: 8px; }
        h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--text-secondary); }
        .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: var(--accent); color: white; } .btn-primary:hover { background: #3d8edb; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); } .btn-outline:hover { background: rgba(255,255,255,0.04); }
        .btn-danger { background: var(--red); color: white; } .btn-danger:hover { background: #e02a4a; }
        .btn-warning { background: var(--orange); color: white; } .btn-warning:hover { background: #e07a35; }
        .btn-success { background: var(--green); color: #000; } .btn-success:hover { background: #00c48c; }
        .btn-sm { padding: 4px 12px; font-size: 11px; border-radius: 6px; }
        .btn-xs { padding: 3px 8px; font-size: 10px; border-radius: 4px; }
        .btn-delete { background: rgba(255,51,88,0.15); border: 1px solid rgba(255,51,88,0.3); color: var(--red); }
        .btn-delete:hover { background: rgba(255,51,88,0.25); }
        .btn-node {
            padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 600;
            border: 1px solid var(--border); background: transparent; color: var(--text-secondary);
            cursor: pointer; transition: all 0.2s; margin: 2px;
        }
        .btn-node.active { border-color: var(--green); color: var(--green); background: rgba(0,221,160,0.1); }
        .btn-node.node-warning { border-color: var(--yellow); color: var(--yellow); background: rgba(255,176,32,0.1); }
        .btn-node.node-offline { border-color: var(--red); color: var(--red); background: rgba(255,51,88,0.1); }
        .btn-node.node-maintenance { border-color: var(--blue); color: var(--blue); background: rgba(77,166,255,0.1); }
        input, select, textarea {
            width: 100%; padding: 10px 14px; background: #0b101f; border: 1px solid var(--border);
            border-radius: 10px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 13px;
            margin-bottom: 16px; outline: none;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--accent); }
        label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 6px; }
        .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .node-control { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
        .node-group { flex: 1; min-width: 150px; }
        .node-label { font-size: 11px; font-weight: 600; margin-bottom: 6px; }
        .error { color: var(--red); font-size: 12px; margin-top: 8px; }
        .success { color: var(--green); font-size: 12px; margin-top: 8px; }
        .hidden { display: none; }
        .incident-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 0; border-bottom: 1px solid var(--border); gap: 12px;
        }
        .incident-item:last-child { border-bottom: none; }
        .incident-info { flex: 1; min-width: 0; }
        .incident-title { font-weight: 600; font-size: 14px; word-break: break-word; }
        .incident-meta { font-size: 11px; color: var(--text-secondary); margin-top: 3px; }
        .button-group { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
        .back-link { position: absolute; top: 20px; left: 24px; font-size: 12px; color: var(--accent); text-decoration: none; display: flex; align-items: center; gap: 4px; z-index: 10; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card {
            background: rgba(255,255,255,0.02); border: 1px solid var(--border);
            border-radius: 10px; padding: 16px; text-align: center;
        }
        .stat-value { font-size: 28px; font-weight: 800; color: var(--text); }
        .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary); margin-top: 4px; }
        .preset-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
        .edit-modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center;
            z-index: 100;
        }
        .edit-modal .card { max-width: 500px; width: 90%; }
    </style>
</head>
<body>
<a href="index.html" class="back-link">← На главную</a>
<div class="container">
    <!-- Форма входа -->
    <div id="loginBlock" class="card">
        <h2>🔐 Вход в админ‑панель</h2>
        <input type="email" id="email" placeholder="Email" />
        <input type="password" id="password" placeholder="Пароль" />
        <button class="btn btn-primary" onclick="signIn()">Войти</button>
        <div id="loginError" class="error"></div>
    </div>

    <!-- Админ-панель (скрыта до входа) -->
    <div id="adminBlock" class="hidden">
        <!-- Статистика -->
        <div class="card">
            <h2>📊 Статистика</h2>
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card"><div class="stat-value" id="statTotal">0</div><div class="stat-label">Всего</div></div>
                <div class="stat-card"><div class="stat-value" id="statActive">0</div><div class="stat-label">Активных</div></div>
                <div class="stat-card"><div class="stat-value" id="statCritical">0</div><div class="stat-label">Критических</div></div>
            </div>
        </div>

        <!-- Быстрые пресеты -->
        <div class="card">
            <h2>⚡ Быстрые пресеты</h2>
            <div class="preset-row">
                <button class="btn btn-success btn-sm" onclick="quickPreset('success')">✅ Всё работает</button>
                <button class="btn btn-warning btn-sm" onclick="quickPreset('warning')">⚠️ Нагрузка</button>
                <button class="btn btn-danger btn-sm" onclick="quickPreset('critical')">🚨 Критический</button>
                <button class="btn btn-primary btn-sm" onclick="quickPreset('maintenance')">🔧 Обслуживание</button>
                <button class="btn btn-outline btn-sm" onclick="quickPreset('investigating')">🔍 Расследование</button>
                <button class="btn btn-success btn-sm" onclick="quickPreset('resolved')">🎉 Исправлено</button>
            </div>
        </div>

        <!-- Создать инцидент -->
        <div class="card">
            <h2>📝 Создать инцидент</h2>
            <label>Тип инцидента</label>
            <select id="incStatus">
                <option value="maintenance">🔧 Тех. обслуживание</option>
                <option value="critical">🚨 Критический сбой</option>
                <option value="warning">⚠️ Предупреждение</option>
                <option value="investigating">🔍 Расследование</option>
                <option value="resolved">✅ Исправлено</option>
                <option value="success">ℹ️ Информация (всё работает)</option>
            </select>
            
            <label>Заголовок</label>
            <input type="text" id="incTitle" placeholder="Краткий заголовок инцидента" />
            
            <label>Описание</label>
            <textarea id="incMessage" rows="4" placeholder="Подробное описание..."></textarea>
            
            <label>Состояние узлов (выберите кнопками)</label>
            <div class="node-control">
                <div class="node-group">
                    <div class="node-label">🇫🇮 Финляндия (HEL-1)</div>
                    <button class="btn-node active" onclick="setNode('node1','online',this)">Online</button>
                    <button class="btn-node" onclick="setNode('node1','warning',this)">Degraded</button>
                    <button class="btn-node" onclick="setNode('node1','offline',this)">Offline</button>
                    <button class="btn-node" onclick="setNode('node1','maintenance',this)">Maint.</button>
                </div>
                <div class="node-group">
                    <div class="node-label">🇳🇱 Нидерланды (AMS-1)</div>
                    <button class="btn-node active" onclick="setNode('node2','online',this)">Online</button>
                    <button class="btn-node" onclick="setNode('node2','warning',this)">Degraded</button>
                    <button class="btn-node" onclick="setNode('node2','offline',this)">Offline</button>
                    <button class="btn-node" onclick="setNode('node2','maintenance',this)">Maint.</button>
                </div>
                <div class="node-group">
                    <div class="node-label">🇫🇷 Франция (PR-1)</div>
                    <button class="btn-node active" onclick="setNode('node3','online',this)">Online</button>
                    <button class="btn-node" onclick="setNode('node3','warning',this)">Degraded</button>
                    <button class="btn-node" onclick="setNode('node3','offline',this)">Offline</button>
                    <button class="btn-node" onclick="setNode('node3','maintenance',this)">Maint.</button>
                </div>
            </div>
            <input type="hidden" id="incNodes" value='{"node1":"online","node2":"online","node3":"online"}' />
            
            <div class="row">
                <button class="btn btn-primary" onclick="createIncident()">Создать</button>
                <button class="btn btn-outline btn-sm" onclick="resetNodeButtons()">🔄 Сбросить ноды</button>
            </div>
            <div id="createError" class="error"></div>
        </div>

        <!-- Активные инциденты -->
        <div class="card">
            <h2>⚡ Активные инциденты</h2>
            <div id="activeList"></div>
        </div>

        <!-- Последние инциденты -->
        <div class="card">
            <h2>📋 Последние инциденты</h2>
            <div id="allList"></div>
            <div class="row" style="margin-top:16px;">
                <button class="btn btn-outline btn-sm" onclick="exportHistory()">📥 Экспорт CSV</button>
            </div>
        </div>

        <!-- Системные операции -->
        <div class="card">
            <h2>⚙️ Системные операции</h2>
            <button class="btn btn-warning" onclick="resetIncidentIDs()">🔄 Обнулить счётчик ID</button>
            <div id="systemMessage" style="margin-top:12px;"></div>
        </div>

        <button class="btn btn-outline" onclick="signOut()">🚪 Выйти</button>
    </div>
</div>

<!-- Модальное окно редактирования -->
<div id="editModal" class="edit-modal hidden">
    <div class="card">
        <h2>✏️ Редактировать инцидент #<span id="editId"></span></h2>
        <input type="hidden" id="editIncId" />
        <label>Заголовок</label>
        <input type="text" id="editTitle" />
        <label>Описание</label>
        <textarea id="editMessage" rows="3"></textarea>
        <label>Статус</label>
        <select id="editStatus">
            <option value="maintenance">🔧 Тех. обслуживание</option>
            <option value="critical">🚨 Критический сбой</option>
            <option value="warning">⚠️ Предупреждение</option>
            <option value="investigating">🔍 Расследование</option>
            <option value="resolved">✅ Исправлено</option>
            <option value="success">ℹ️ Информация</option>
        </select>
        <div class="row">
            <button class="btn btn-primary" onclick="saveEdit()">💾 Сохранить</button>
            <button class="btn btn-outline" onclick="closeEdit()">Отмена</button>
        </div>
        <div id="editError" class="error"></div>
    </div>
</div>

<script>
    (function() {
        const SUPABASE_URL = 'https://ovkimozzqfejlhmzxvuw.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_eq7YpcP3JONUtlFe00Zq0g_AsPLv6On';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Состояние нод по умолчанию
        let currentNodeStates = { node1: 'online', node2: 'online', node3: 'online' };

        // ========== АВТОРИЗАЦИЯ ==========
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) { showAdmin(); } else { showLogin(); }
        }

        function showLogin() {
            document.getElementById('loginBlock').classList.remove('hidden');
            document.getElementById('adminBlock').classList.add('hidden');
        }

        function showAdmin() {
            document.getElementById('loginBlock').classList.add('hidden');
            document.getElementById('adminBlock').classList.remove('hidden');
            loadAll();
        }

        window.signIn = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) { document.getElementById('loginError').textContent = error.message; }
            else { showAdmin(); }
        };

        window.signOut = async () => {
            await supabase.auth.signOut();
            showLogin();
        };

        // ========== НОДЫ (ВИЗУАЛЬНЫЕ КНОПКИ) ==========
        window.setNode = (nodeId, status, btn) => {
            // Обновляем скрытое поле
            currentNodeStates[nodeId] = status;
            document.getElementById('incNodes').value = JSON.stringify(currentNodeStates);

            // Визуально выделяем активную кнопку
            const parent = btn.parentElement;
            parent.querySelectorAll('.btn-node').forEach(b => {
                b.className = 'btn-node';
            });
            const statusClass = status === 'warning' ? 'node-warning' :
                               status === 'offline' ? 'node-offline' :
                               status === 'maintenance' ? 'node-maintenance' : 'active';
            btn.classList.add(statusClass);
        };

        window.resetNodeButtons = () => {
            currentNodeStates = { node1: 'online', node2: 'online', node3: 'online' };
            document.getElementById('incNodes').value = JSON.stringify(currentNodeStates);
            document.querySelectorAll('.btn-node').forEach((b, i) => {
                b.className = 'btn-node';
                if (i % 4 === 0) b.classList.add('active'); // Первая кнопка в каждой группе = Online
            });
        };

        // ========== БЫСТРЫЕ ПРЕСЕТЫ ==========
        window.quickPreset = async (status) => {
            const presets = {
                success: { title: 'Все системы работают', message: 'Инфраструктура функционирует нормально.', nodes: {node1:'online',node2:'online',node3:'online'} },
                warning: { title: 'Повышенная нагрузка', message: 'Зафиксирована высокая нагрузка на сетевые узлы.', nodes: {node1:'warning',node2:'warning',node3:'online'} },
                critical: { title: 'Критический сбой', message: 'Обнаружен критический сбой. Инженеры уведомлены.', nodes: {node1:'offline',node2:'online',node3:'online'} },
                maintenance: { title: 'Плановое обслуживание', message: 'Проводятся регламентные работы.', nodes: {node1:'maintenance',node2:'maintenance',node3:'online'} },
                investigating: { title: 'Расследование инцидента', message: 'Анализируем причины. Скоро отчёт.', nodes: {node1:'offline',node2:'warning',node3:'online'} },
                resolved: { title: 'Инцидент исправлен', message: 'Все системы восстановлены.', nodes: {node1:'online',node2:'online',node3:'online'} }
            };
            const p = presets[status];
            
            document.getElementById('incStatus').value = status;
            document.getElementById('incTitle').value = p.title;
            document.getElementById('incMessage').value = p.message;
            currentNodeStates = p.nodes;
            document.getElementById('incNodes').value = JSON.stringify(p.nodes);
            
            // Обновить визуальные кнопки
            ['node1','node2','node3'].forEach(nodeId => {
                const status = p.nodes[nodeId];
                const group = document.querySelector(`.node-group:nth-child(${nodeId === 'node1' ? 1 : nodeId === 'node2' ? 2 : 3})`);
                group.querySelectorAll('.btn-node').forEach(b => b.className = 'btn-node');
                const statusMap = { online: 0, warning: 1, offline: 2, maintenance: 3 };
                const idx = statusMap[status] || 0;
                const btn = group.querySelectorAll('.btn-node')[idx];
                const statusClass = status === 'warning' ? 'node-warning' :
                                   status === 'offline' ? 'node-offline' :
                                   status === 'maintenance' ? 'node-maintenance' : 'active';
                btn.classList.add(statusClass);
            });
        };

        // ========== CRUD ==========
        window.createIncident = async () => {
            const status = document.getElementById('incStatus').value;
            const title = document.getElementById('incTitle').value;
            const message = document.getElementById('incMessage').value;
            const nodes = JSON.parse(document.getElementById('incNodes').value);

            if (!title) { document.getElementById('createError').textContent = 'Введите заголовок'; return; }

            await supabase.from('incidents').update({ is_active: false }).eq('is_active', true);
            const { error } = await supabase.from('incidents').insert([{
                title, message, status, affected_nodes: nodes, is_active: true
            }]);

            if (error) { document.getElementById('createError').textContent = error.message; }
            else {
                document.getElementById('createError').textContent = '';
                document.getElementById('incTitle').value = '';
                document.getElementById('incMessage').value = '';
                loadAll();
            }
        };

        window.toggleActive = async (id, setActive) => {
            if (setActive) { await supabase.from('incidents').update({ is_active: false }).eq('is_active', true); }
            await supabase.from('incidents').update({ is_active: setActive }).eq('id', id);
            loadAll();
        };

        window.deleteIncident = async (id) => {
            if (!confirm('Удалить инцидент #' + id + '?')) return;
            await supabase.from('incidents').delete().eq('id', id);
            loadAll();
        };

        // ========== РЕДАКТИРОВАНИЕ ==========
        window.openEdit = (inc) => {
            document.getElementById('editIncId').value = inc.id;
            document.getElementById('editId').textContent = inc.id;
            document.getElementById('editTitle').value = inc.title;
            document.getElementById('editMessage').value = inc.message || '';
            document.getElementById('editStatus').value = inc.status;
            document.getElementById('editModal').classList.remove('hidden');
        };

        window.closeEdit = () => {
            document.getElementById('editModal').classList.add('hidden');
            document.getElementById('editError').textContent = '';
        };

        window.saveEdit = async () => {
            const id = document.getElementById('editIncId').value;
            const title = document.getElementById('editTitle').value;
            const message = document.getElementById('editMessage').value;
            const status = document.getElementById('editStatus').value;

            const { error } = await supabase.from('incidents')
                .update({ title, message, status })
                .eq('id', id);

            if (error) { document.getElementById('editError').textContent = error.message; }
            else { closeEdit(); loadAll(); }
        };

        // ========== СБРОС ID ==========
        window.resetIncidentIDs = async () => {
            if (!confirm('⚠️ Удалить ВСЕ инциденты и сбросить счётчик ID?')) return;
            const msgDiv = document.getElementById('systemMessage');
            msgDiv.className = '';
            msgDiv.textContent = 'Выполняется...';
            const { error } = await supabase.rpc('reset_incidents_table');
            if (error) { msgDiv.className = 'error'; msgDiv.textContent = 'Ошибка: ' + error.message; }
            else { msgDiv.className = 'success'; msgDiv.textContent = '✅ Таблица очищена, счётчик ID сброшен'; loadAll(); }
        };

        // ========== ЭКСПОРТ CSV ==========
        window.exportHistory = async () => {
            const { data } = await supabase.from('incidents').select('*').order('created_at', { ascending: false });
            if (!data || !data.length) return alert('Нет данных для экспорта');
            
            let csv = 'ID,Дата,Статус,Заголовок,Описание,Активен,Ноды\n';
            data.forEach(inc => {
                csv += `${inc.id},"${new Date(inc.created_at).toLocaleString('ru-RU')}","${inc.status}","${inc.title}","${(inc.message||'').replace(/"/g,'""')}","${inc.is_active}","${JSON.stringify(inc.affected_nodes).replace(/"/g,'""')}"\n`;
            });
            
            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'zenitvpn-incidents.csv';
            a.click(); URL.revokeObjectURL(url);
        };

        // ========== ЗАГРУЗКА ДАННЫХ ==========
        async function loadAll() {
            await Promise.all([loadStats(), loadIncidents()]);
        }

        async function loadStats() {
            const { data, error } = await supabase.rpc('get_incident_stats');
            if (error || !data || !data.length) return;
            const s = data[0];
            document.getElementById('statTotal').textContent = s.total_count || 0;
            document.getElementById('statActive').textContent = s.active_count || 0;
            document.getElementById('statCritical').textContent = s.critical_count || 0;
        }

        async function loadIncidents() {
            const { data: active } = await supabase.from('incidents').select('*').eq('is_active', true).order('created_at', { ascending: false });
            document.getElementById('activeList').innerHTML = (active || []).length
                ? active.map(inc => incidentHTML(inc)).join('')
                : '<p style="color:var(--text-secondary)">Нет активных инцидентов</p>';

            const { data: all } = await supabase.from('incidents').select('*').order('created_at', { ascending: false }).limit(20);
            document.getElementById('allList').innerHTML = (all || []).map(inc => incidentHTML(inc)).join('');
        }

        function incidentHTML(inc) {
            const date = new Date(inc.created_at).toLocaleString('ru-RU');
            const nodesSummary = Object.values(inc.affected_nodes || {}).join(', ');
            return `
                <div class="incident-item">
                    <div class="incident-info">
                        <div class="incident-title">#${inc.id} ${inc.title} <span style="font-size:11px;color:var(--text-secondary)">(${inc.status})</span></div>
                        <div class="incident-meta">${date} • ${nodesSummary} ${inc.is_active ? '🟢' : ''}</div>
                    </div>
                    <div class="button-group">
                        <button class="btn btn-sm btn-outline" onclick="openEdit(${JSON.stringify(inc).replace(/"/g,'&quot;')})" title="Редактировать">✏️</button>
                        <button class="btn btn-sm ${inc.is_active ? 'btn-danger' : 'btn-outline'}" onclick="toggleActive(${inc.id}, ${!inc.is_active})">
                            ${inc.is_active ? 'Деактив.' : 'Актив.'}
                        </button>
                        <button class="btn btn-sm btn-delete" onclick="deleteIncident(${inc.id})" title="Удалить">🗑️</button>
                    </div>
                </div>
            `;
        }

        window.addEventListener('load', checkSession);
    })();
</script>
</body>
</html>
