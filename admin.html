<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenitVPN — Админ‑панель</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root{--bg:#04060f;--surface:#0c1226;--border:#1a223a;--text:#dce3f0;--text-secondary:#8892aa;--accent:#4da6ff;--red:#ff3358;--green:#00dda0;--yellow:#ffb020}
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
        body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);pointer-events:none;z-index:0}
        .container{width:100%;max-width:720px;position:relative;z-index:1}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:32px;backdrop-filter:blur(40px);box-shadow:0 40px 100px rgba(0,0,0,0.6);margin-bottom:24px}
        h2{font-size:18px;font-weight:700;margin-bottom:24px;color:white;display:flex;align-items:center;gap:8px}
        .btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all 0.2s}
        .btn-primary{background:var(--accent);color:white}.btn-primary:hover{background:#3d8edb}
        .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}.btn-outline:hover{background:rgba(255,255,255,0.04)}
        .btn-danger{background:var(--red);color:white}.btn-danger:hover{background:#e02a4a}
        .btn-sm{padding:4px 12px;font-size:11px;border-radius:6px}
        .btn-delete{background:rgba(255,51,88,0.15);border:1px solid rgba(255,51,88,0.3);color:var(--red)}.btn-delete:hover{background:rgba(255,51,88,0.25)}
        input,select,textarea{width:100%;padding:10px 14px;background:#0b101f;border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;margin-bottom:16px;outline:none}
        input:focus,select:focus,textarea:focus{border-color:var(--accent)}
        label{display:block;font-size:11px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--text-secondary);margin-bottom:6px}
        .error{color:var(--red);font-size:12px;margin-top:8px}
        .success-message{color:var(--green);font-size:12px;margin-top:8px}
        .hidden{display:none}
        .incident-item{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border);gap:12px}
        .incident-item:last-child{border-bottom:none}
        .incident-info{flex:1}.incident-title{font-weight:600;font-size:14px}.incident-meta{font-size:11px;color:var(--text-secondary);margin-top:3px}
        .button-group{display:flex;gap:8px;align-items:center}
        .back-link{position:absolute;top:20px;left:24px;font-size:12px;color:var(--accent);text-decoration:none;display:flex;align-items:center;gap:4px;z-index:10}
        .loader-overlay{position:fixed;inset:0;z-index:9999;background:rgba(4,6,15,0.85);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px}
        .loader-overlay.hidden{display:none}
        .loader-text{font-size:14px;font-weight:500;letter-spacing:1px;color:var(--text-secondary);text-transform:uppercase}
        .loader-spinner{width:32px;height:32px;border:2px solid rgba(77,166,255,0.2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .footer-note{font-size:10px;color:var(--text-3);text-align:center;margin-top:12px}
        .retry-btn{background:var(--red);color:white;border:none;padding:6px 14px;border-radius:6px;font-size:11px;cursor:pointer;margin-left:10px}
        .node-select-row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
        .node-select-row label{min-width:100px;margin-bottom:0;display:flex;align-items:center;gap:6px}
        .node-select-row select{width:auto;flex:1;margin-bottom:0}
    </style>
</head>
<body>
<a href="index.html" class="back-link">← На главную</a>
<div id="loader" class="loader-overlay hidden"><div class="loader-spinner"></div><div class="loader-text" id="loaderText">Выполняется...</div></div>
<div class="container">
<div id="loginBlock" class="card">
<h2>🔐 Вход в админ‑панель</h2>
<input type="email" id="email" placeholder="Email" autocomplete="off" />
<input type="password" id="password" placeholder="Пароль" autocomplete="off" />
<button class="btn btn-primary" onclick="signIn()">Войти</button>
<div id="loginError" class="error"></div>
</div>
<div id="adminBlock" class="hidden">
<div class="card">
<h2>📝 Создать инцидент</h2>
<label>Тип инцидента</label>
<select id="incStatus">
    <option value="maintenance">Тех. обслуживание</option>
    <option value="critical">Критический сбой</option>
    <option value="warning">Предупреждение</option>
    <option value="success">Информация (всё работает)</option>
    <option value="whitelist">Белые списки</option>
</select>
<label>Заголовок</label>
<input type="text" id="incTitle" placeholder="Краткий заголовок" />
<label>Описание</label>
<textarea id="incMessage" rows="4" placeholder="Подробное описание..."></textarea>
<label>Состояние узлов</label>
<div class="node-select-row">
    <label>🇫🇮 Финляндия</label>
    <select id="node1"><option value="online">Online</option><option value="offline">Offline</option><option value="warning">Degraded</option><option value="maintenance">Maintenance</option></select>
</div>
<div class="node-select-row">
    <label>🇳🇱 Нидерланды</label>
    <select id="node2"><option value="online">Online</option><option value="offline">Offline</option><option value="warning">Degraded</option><option value="maintenance">Maintenance</option></select>
</div>
<div class="node-select-row">
    <label>🇫🇷 Франция</label>
    <select id="node3"><option value="online">Online</option><option value="offline">Offline</option><option value="warning">Degraded</option><option value="maintenance">Maintenance</option></select>
</div>
<button class="btn btn-primary" onclick="createIncident()">Создать</button>
<div id="createError" class="error"></div>
<div id="createSuccess" class="success-message"></div>
</div>
<div class="card"><h2>⚡ Активные инциденты <button class="retry-btn" onclick="loadIncidents()" title="Повторить загрузку">🔄</button></h2><div id="activeList"></div></div>
<div class="card"><h2>📋 Последние инциденты <button class="retry-btn" onclick="loadIncidents()" title="Повторить загрузку">🔄</button></h2><div id="allList"></div></div>
<button class="btn btn-outline" onclick="signOut()">🚪 Выйти</button>
<div class="footer-note" id="proxyNote">Прокси: проверка...</div>
</div>
</div>

<script>
(function(){
const SUPABASE_ANON_KEY='sb_publishable_v7HvLsYBsknR6LbMZmEDNA_Di32JcCk';

const PROXY_URLS = [
    'https://corsproxy.io/?' + encodeURIComponent('https://vuzcudxulhqkrkniulsl.supabase.co'),
    'https://vuzcudxulhqkrkniulsl.supabase.co',
    'https://zenitvpn-proxy.maximsmirnov35vologda.workers.dev'
];

const PROXY_NAMES = {
    'corsproxy.io': 'CORS-прокси',
    'vuzcudxulhqkrkniulsl.supabase.co': 'Прямой доступ',
    'zenitvpn-proxy': 'Cloudflare Workers'
};

const ALLOWED_NODE_STATUSES = ['online','offline','warning','maintenance'];
const API_TIMEOUT = 15000;

let supabase = null;
let currentProxyName = 'Проверка...';

function withTimeout(promise, ms, errorMessage = 'Время ожидания истекло') {
    return Promise.race([
        promise,
        new Promise((_, reject) => setTimeout(() => reject(new Error(errorMessage)), ms))
    ]);
}

function getProxyName(url) {
    for (let key in PROXY_NAMES) {
        if (url.includes(key)) return PROXY_NAMES[key];
    }
    return 'Неизвестный прокси';
}

function updateProxyNote(name) {
    const note = document.getElementById('proxyNote');
    if (note) note.textContent = 'Прокси: ' + name;
    currentProxyName = name;
}

async function findWorkingUrl(){
    updateProxyNote('Поиск сервера...');
    for(let url of PROXY_URLS){
        try{
            let testUrl = url.includes('corsproxy.io') || url.includes('allorigins') ? url + '/rest/v1/' : url + '/rest/v1/';
            let resp = await fetch(testUrl, {method:'HEAD',signal:AbortSignal.timeout(5000)});
            if(resp.ok || resp.status===401 || resp.status===400){
                let name = getProxyName(url);
                console.log('✅ Админка: рабочий URL:', url, '—', name);
                updateProxyNote(name);
                return url;
            }
        }catch(e){console.log('❌ Админка: не работает:', url)}
    }
    updateProxyNote('Все серверы недоступны');
    return PROXY_URLS[0];
}

function showLoader(t='Выполняется...'){document.getElementById('loaderText').textContent=t;document.getElementById('loader').classList.remove('hidden')}
function hideLoader(){document.getElementById('loader').classList.add('hidden')}

async function checkSession(){
    if(!supabase){
        let url = await findWorkingUrl();
        supabase = window.supabase.createClient(url, SUPABASE_ANON_KEY);
    }
    let{data:{session}}=await supabase.auth.getSession();
    if(session){showAdmin()}else{showLogin()}
}
function showLogin(){document.getElementById('loginBlock').classList.remove('hidden');document.getElementById('adminBlock').classList.add('hidden')}
function showAdmin(){document.getElementById('loginBlock').classList.add('hidden');document.getElementById('adminBlock').classList.remove('hidden');loadIncidents()}

window.signIn=async()=>{
    let e=document.getElementById('email').value,p=document.getElementById('password').value;
    document.getElementById('loginError').textContent='';
    showLoader('Выполняется вход...');
    try {
        await withTimeout(supabase.auth.signInWithPassword({email:e,password:p}), API_TIMEOUT, 'Вход не выполнен: сервер не отвечает');
        hideLoader();
        showAdmin();
    } catch(error) {
        hideLoader();
        document.getElementById('loginError').textContent='Ошибка: ' + (error.message || 'Неизвестная ошибка');
    }
};
window.signOut=async()=>{await supabase.auth.signOut();showLogin()};

window.createIncident=async()=>{
document.getElementById('createError').textContent='';document.getElementById('createSuccess').textContent='';
let status=document.getElementById('incStatus').value,title=document.getElementById('incTitle').value,message=document.getElementById('incMessage').value;
let nodes = {
    node1: document.getElementById('node1').value,
    node2: document.getElementById('node2').value,
    node3: document.getElementById('node3').value
};
showLoader('Создание инцидента...');
try {
    await withTimeout(supabase.from('incidents').update({is_active:false}).eq('is_active',true), API_TIMEOUT, 'Сервер не отвечает');
    await withTimeout(supabase.from('incidents').insert([{title,message,status,affected_nodes:nodes,is_active:true}]), API_TIMEOUT, 'Сервер не отвечает');
    document.getElementById('incTitle').value='';document.getElementById('incMessage').value='';
    document.getElementById('node1').value='online';
    document.getElementById('node2').value='online';
    document.getElementById('node3').value='online';
    await loadIncidents();
    hideLoader();
    document.getElementById('createSuccess').textContent='✅ Инцидент создан';
    setTimeout(()=>{document.getElementById('createSuccess').textContent=''},3000);
} catch(e) {
    hideLoader();
    document.getElementById('createError').textContent='Ошибка создания: ' + (e.message || 'Сервер не отвечает');
}
};

window.loadIncidents = async function(){
    document.getElementById('activeList').innerHTML='<p style="color:var(--text-secondary)">Загрузка...</p>';
    document.getElementById('allList').innerHTML='<p style="color:var(--text-secondary)">Загрузка...</p>';
    if(!supabase || window._lastLoadFailed){
        let url = await findWorkingUrl();
        supabase = window.supabase.createClient(url, SUPABASE_ANON_KEY);
        window._lastLoadFailed = false;
    }
    try{
        let{data:active,error:activeError}=await withTimeout(supabase.from('incidents').select('*').eq('is_active',true).order('created_at',{ascending:false}), API_TIMEOUT, 'Ошибка загрузки активных');
        if(activeError){
            console.error('Ошибка загрузки активных:',activeError);
            document.getElementById('activeList').innerHTML='<p style="color:var(--red)">Ошибка загрузки. <button class="retry-btn" onclick="loadIncidents()">Повторить</button></p>';
            window._lastLoadFailed = true;
        }else{
            document.getElementById('activeList').innerHTML=(active&&active.length)?active.map(inc=>incidentHTML(inc)).join(''):'<p style="color:var(--text-secondary)">Нет активных инцидентов</p>';
        }
        let{data:all,error:allError}=await withTimeout(supabase.from('incidents').select('*').order('created_at',{ascending:false}).limit(20), API_TIMEOUT, 'Ошибка загрузки истории');
        if(allError){
            console.error('Ошибка загрузки истории:',allError);
            document.getElementById('allList').innerHTML='<p style="color:var(--red)">Ошибка загрузки. <button class="retry-btn" onclick="loadIncidents()">Повторить</button></p>';
            window._lastLoadFailed = true;
        }else{
            document.getElementById('allList').innerHTML=(all||[]).map(inc=>incidentHTML(inc)).join('');
        }
    }catch(e){
        console.error('Сетевая ошибка:',e);
        document.getElementById('activeList').innerHTML='<p style="color:var(--red)">Сетевая ошибка. <button class="retry-btn" onclick="loadIncidents()">Повторить</button></p>';
        document.getElementById('allList').innerHTML='<p style="color:var(--red)">Сетевая ошибка. <button class="retry-btn" onclick="loadIncidents()">Повторить</button></p>';
        window._lastLoadFailed = true;
    }
};

function incidentHTML(inc){let d=new Date(inc.created_at).toLocaleString('ru-RU');return'<div class="incident-item"><div class="incident-info"><div class="incident-title">'+inc.title+' <span style="font-size:11px;color:var(--text-secondary)">('+inc.status+')</span></div><div class="incident-meta">'+d+' '+(inc.is_active?'🟢 Активен':'')+'</div></div><div class="button-group"><button class="btn btn-sm '+(inc.is_active?'btn-danger':'btn-outline')+'" onclick="toggleActive('+inc.id+','+!inc.is_active+')">'+(inc.is_active?'Деактивировать':'Сделать активным')+'</button><button class="btn btn-sm btn-delete" onclick="deleteIncident('+inc.id+')">🗑️</button></div></div>'}

window.toggleActive=async(id,setActive)=>{
    showLoader('Обновление статуса...');
    try {
        if(setActive){
            await withTimeout(supabase.from('incidents').update({is_active:false}).eq('is_active',true), API_TIMEOUT, 'Сервер не отвечает');
        }
        await withTimeout(supabase.from('incidents').update({is_active:setActive}).eq('id',id), API_TIMEOUT, 'Сервер не отвечает');
        await loadIncidents();
        hideLoader();
    } catch(e) {
        hideLoader();
        alert('Ошибка: ' + (e.message || 'Сервер не отвечает'));
    }
};
window.deleteIncident=async(id)=>{
    if(!confirm('Удалить инцидент?')) return;
    showLoader('Удаление инцидента...');
    try {
        await withTimeout(supabase.from('incidents').delete().eq('id',id), API_TIMEOUT, 'Сервер не отвечает');
        await loadIncidents();
        hideLoader();
    } catch(e) {
        hideLoader();
        alert('Ошибка удаления: ' + (e.message || 'Сервер не отвечает'));
    }
};

window.addEventListener('load', async () => {
    showLoader('Подключение к серверу...');
    await checkSession();
    hideLoader();
});
})();
</script>
</body>
</html>
