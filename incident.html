<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenitVPN — Детали инцидента</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #04060f;
            --surface: rgba(8, 12, 26, 0.8);
            --surface-raised: rgba(255,255,255,0.03);
            --border: rgba(255,255,255,0.06);
            --border-strong: rgba(255,255,255,0.1);
            --green: #00dda0;
            --yellow: #ffb020;
            --red: #ff3358;
            --blue: #4da6ff;
            --text-1: #eef2ff;
            --text-2: #8892aa;
            --text-3: #404866;
        }

        body.light-theme {
            --bg: #f5f7fa;
            --surface: rgba(255,255,255,0.85);
            --surface-raised: rgba(0,0,0,0.03);
            --border: rgba(0,0,0,0.08);
            --border-strong: rgba(0,0,0,0.15);
            --green: #00b37e;
            --yellow: #e6a700;
            --red: #d63031;
            --blue: #3b82f6;
            --text-1: #1a1a2e;
            --text-2: #4a4a6a;
            --text-3: #7a7a9a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text-1);
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 24px; transition: background 0.3s, color 0.3s;
        }
        .container { width: 100%; max-width: 600px; position: relative; z-index: 1; animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) both; }
        @keyframes fadeUp { from { opacity:0; transform: translateY(18px); } to { opacity:1; transform: translateY(0); } }
        .back-link { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 20px; color: var(--blue); text-decoration: none; font-size: 13px; font-weight: 600; }
        .card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 18px;
            backdrop-filter: blur(60px); -webkit-backdrop-filter: blur(60px);
            padding: 32px; box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            transition: background 0.3s;
        }
        .status-badge {
            display: inline-flex; align-items: center; gap: 8px; padding: 6px 14px; border-radius: 100px;
            font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 20px;
            border: 1px solid transparent;
        }
        .badge-success { background: rgba(0,221,160,0.08); border-color: rgba(0,221,160,0.18); color: var(--green); }
        .badge-warning { background: rgba(255,176,32,0.08); border-color: rgba(255,176,32,0.2); color: var(--yellow); }
        .badge-critical { background: rgba(255,51,88,0.08); border-color: rgba(255,51,88,0.2); color: var(--red); }
        .badge-info { background: rgba(77,166,255,0.08); border-color: rgba(77,166,255,0.2); color: var(--blue); }
        .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
        h1 { font-size: 24px; font-weight: 800; margin-bottom: 12px; color: var(--text-1); }
        .description { font-size: 14px; color: var(--text-2); line-height: 1.7; margin-bottom: 28px; white-space: pre-wrap; }
        .meta-row { display: flex; gap: 0; background: var(--surface-raised); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 28px; }
        .meta-item { flex: 1; padding: 12px 14px; border-right: 1px solid var(--border); }
        .meta-item:last-child { border-right: none; }
        .meta-label { font-size: 9.5px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-3); margin-bottom: 4px; }
        .meta-value { font-size: 12px; font-weight: 600; font-family: 'JetBrains Mono', monospace; color: var(--text-2); word-break: break-word; }
        .servers-title { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text-3); margin-bottom: 12px; }
        .servers-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 28px; }
        .server-card {
            background: var(--surface-raised); border: 1px solid var(--border); border-radius: 10px;
            padding: 12px; text-align: center;
        }
        .server-flag { font-size: 20px; margin-bottom: 4px; }
        .server-name { font-size: 11px; font-weight: 600; color: var(--text-1); margin-bottom: 2px; }
        .server-status {
            font-size: 10px; font-weight: 700; font-family: 'JetBrains Mono', monospace;
            padding: 2px 8px; border-radius: 4px; display: inline-block;
        }
        .status-online { color: var(--green); background: rgba(0,221,160,0.1); }
        .status-warning { color: var(--yellow); background: rgba(255,176,32,0.1); }
        .status-offline { color: var(--red); background: rgba(255,51,88,0.1); }
        .status-maintenance { color: var(--blue); background: rgba(77,166,255,0.1); }
        .actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .btn {
            display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 10px;
            font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: all 0.2s;
            background: var(--surface-raised); border: 1px solid var(--border); color: var(--text-1);
        }
        .btn:hover { background: var(--border); }
        .copied-message { font-size: 12px; color: var(--green); margin-left: 10px; opacity: 0; transition: opacity 0.2s; }
        .copied-message.visible { opacity: 1; }

        /* кнопка переключения темы */
        .theme-toggle {
            background: transparent; border: 1px solid var(--border);
            border-radius: 8px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--text-2); font-size: 16px; transition: all 0.3s; margin-left: 8px;
        }
        .theme-toggle:hover { background: var(--surface-raised); border-color: var(--border-strong); }

        .loader {
            display: flex; align-items: center; justify-content: center; padding: 40px;
            color: var(--text-3); font-size: 14px;
        }

        @media (max-width: 580px) {
            .meta-row { flex-direction: column; }
            .meta-item { border-right: none; border-bottom: 1px solid var(--border); }
            .meta-item:last-child { border-bottom: none; }
            .servers-list { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 20px;">
        <a href="index.html" class="back-link">← На главную</a>
        <button id="themeToggleBtn" class="theme-toggle" title="Переключить тему">🌙</button>
    </div>
    <div class="card" id="incidentCard">
        <div class="loader" id="loader">Загрузка инцидента...</div>
    </div>
</div>

<script>
(function() {
    const SUPABASE_ANON_KEY = 'sb_publishable_v7HvLsYBsknR6LbMZmEDNA_Di32JcCk';
    const PROXY_URLS = [
        'https://corsproxy.io/?' + encodeURIComponent('https://vuzcudxulhqkrkniulsl.supabase.co'),
        'https://vuzcudxulhqkrkniulsl.supabase.co',
        'https://zenitvpn-proxy.maximsmirnov35vologda.workers.dev'
    ];

    const STATUS_LABELS = {
        success: 'Всё работает',
        maintenance: 'Обслуживание',
        critical: 'Критический сбой',
        warning: 'Предупреждение'
    };
    const STATUS_CLASSES = {
        success: 'badge-success',
        maintenance: 'badge-info',
        critical: 'badge-critical',
        warning: 'badge-warning'
    };
    const NODE_NAMES = {
        node1: { name: 'Финляндия', flag: '🇫🇮' },
        node2: { name: 'Нидерланды', flag: '🇳🇱' },
        node3: { name: 'Франция', flag: '🇫🇷' }
    };

    // --- тема ---
    function applyTheme(theme) {
        if (theme === 'light') {
            document.body.classList.add('light-theme');
        } else {
            document.body.classList.remove('light-theme');
        }
        localStorage.setItem('zenitvpn_theme', theme);
        updateThemeIcon(theme);
    }

    function toggleTheme() {
        const isLight = document.body.classList.contains('light-theme');
        applyTheme(isLight ? 'dark' : 'light');
    }

    function updateThemeIcon(theme) {
        const btn = document.getElementById('themeToggleBtn');
        if (btn) btn.textContent = theme === 'light' ? '☀️' : '🌙';
    }

    function initTheme() {
        const saved = localStorage.getItem('zenitvpn_theme') || 'dark';
        applyTheme(saved);
    }

    // --- прокси ---
    async function findWorkingUrl() {
        for (let url of PROXY_URLS) {
            try {
                let testUrl = url.includes('corsproxy.io') || url.includes('allorigins') ? url + '/rest/v1/' : url + '/rest/v1/';
                let resp = await fetch(testUrl, { method: 'HEAD', signal: AbortSignal.timeout(5000) });
                if (resp.ok || resp.status === 401 || resp.status === 400) {
                    return url;
                }
            } catch (e) {}
        }
        return PROXY_URLS[0];
    }

    async function getIncident(id) {
        const workingUrl = await findWorkingUrl();
        const supabase = window.supabase.createClient(workingUrl, SUPABASE_ANON_KEY);
        const { data, error } = await supabase.from('incidents').select('*').eq('id', id).single();
        if (error) throw error;
        return data;
    }

    function renderIncident(inc) {
        const card = document.getElementById('incidentCard');
        const statusClass = STATUS_CLASSES[inc.status] || 'badge-success';
        const statusText = STATUS_LABELS[inc.status] || inc.status;
        const createdAt = new Date(inc.created_at).toLocaleString('ru-RU');
        const nodes = inc.affected_nodes || { node1: 'online', node2: 'online', node3: 'online' };

        const serversHtml = Object.entries(nodes).map(([nodeId, status]) => {
            const node = NODE_NAMES[nodeId] || { name: nodeId, flag: '❓' };
            return `
                <div class="server-card">
                    <div class="server-flag">${node.flag}</div>
                    <div class="server-name">${node.name}</div>
                    <div class="server-status status-${status}">${status}</div>
                </div>
            `;
        }).join('');

        card.innerHTML = `
            <div class="status-badge ${statusClass}"><div class="badge-dot"></div>${statusText}</div>
            <h1>${inc.title}</h1>
            <div class="description">${inc.message || 'Нет описания'}</div>
            <div class="meta-row">
                <div class="meta-item"><div class="meta-label">ID инцидента</div><div class="meta-value">#${inc.id}</div></div>
                <div class="meta-item"><div class="meta-label">Создан</div><div class="meta-value">${createdAt}</div></div>
                <div class="meta-item"><div class="meta-label">Активен</div><div class="meta-value">${inc.is_active ? 'Да' : 'Нет'}</div></div>
            </div>
            <div class="servers-title">Затронутые узлы</div>
            <div class="servers-list">${serversHtml}</div>
            <div class="actions">
                <button class="btn" onclick="copyLink(${inc.id})">
                    📋 Копировать ссылку
                </button>
                <span class="copied-message" id="copiedMsg">Ссылка скопирована!</span>
            </div>
        `;
    }

    function showError(message) {
        document.getElementById('incidentCard').innerHTML = `
            <div style="text-align:center;padding:20px;color:var(--red);">${message}</div>
        `;
    }

    window.copyLink = function(id) {
        const url = window.location.origin + window.location.pathname + '?id=' + id;
        navigator.clipboard.writeText(url).then(() => {
            const msg = document.getElementById('copiedMsg');
            if (msg) {
                msg.classList.add('visible');
                setTimeout(() => msg.classList.remove('visible'), 2000);
            }
        }).catch(() => alert('Не удалось скопировать ссылку'));
    };

    // инициализация
    document.addEventListener('DOMContentLoaded', async () => {
        initTheme();
        document.getElementById('themeToggleBtn').addEventListener('click', toggleTheme);

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        if (!id) {
            showError('Инцидент не указан');
            return;
        }
        try {
            const inc = await getIncident(id);
            renderIncident(inc);
        } catch (e) {
            console.error(e);
            showError('Не удалось загрузить инцидент. Возможно, он был удалён или проблема с сетью.');
        }
    });
})();
</script>
</body>
</html>
