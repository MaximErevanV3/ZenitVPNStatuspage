<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenitVPN — Сервисный Статус</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Компоненты неонового бэкграунда -->
    <div class="space-glow-1"></div>
    <div class="space-glow-2"></div>

    <script>
        /* ==========================================================================
           ПАНЕЛЬ УПРАВЛЕНИЯ КОНТЕНТОМ (Пишите свой текст внутри кавычек)
           ========================================================================== */
        const VPN_STATUS_CONFIG = {
            // Тип глобальной аварии: 'critical' (красный), 'warning' (желтый), 'info' (синий), 'success' (зеленый)
            globalStatusType: 'critical', 

            // Названия заголовков и мета-данные
            bannerMessage: 'Технический инцидент сети',
            mainTitle: 'Авария на стороне магистрального провайдера',
            incidentID: '#ZNT-0001',
            lastUpdatedTime: '04.06.2026, 19:50 MSK',

            // ВАШ ЛИЧНЫЙ ТЕКСТ УВЕДОМЛЕНИЯ ПОЛЬЗОВАТЕЛЯМ (\n — это перенос строки)
            customMessage: 'Зафиксирован сбой в работе дата-центра в Финляндии. Проблема вызвана техническим сбоем на стороне вышестоящего провайдера связи.\n\nВ связи с этим узел во Франции полностью изолирован.\nЧто делать пользователям:\n1. Вручную переключитесь на сервер Франция — трафик этого узла идет по изолированной кабельной системе, он полностью стабилен.\n2. При возникновении проблем с подключением, активируйте альтернативные протоколы в настройках вашего приложения.\n\nНаши специалисты совместно с инженерами ДЦ уже занимаются восстановлением Дата-центра.',

            // Имена для трех ваших локаций
            serverNames: {
                node1: 'Финляндия (HEL1)',
                node2: 'Нидерланды (AMS-1)',
                node3: 'Франция (PR-1)'
            },

            // Индивидуальные статусы мигания узлов: 'online' (зеленый), 'warning' (желтый), 'offline' (красный)
            serverStatuses: {
                node1Status: 'offline',     
                node2Status: 'online', 
                node3Status: 'online'      
            }
        };
    </script>

    <div class="container">
        <div class="status-panel" id="mainPanel">
            
            <!-- Логотип компании -->
            <div class="logo">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-right:2px; color:rgb(var(--rgb-info)); filter:drop-shadow(0 0 8px rgba(0,183,255,0.4));"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                <span>Zenit<b>VPN</b></span>
            </div>

            <!-- Главный статус-баннер -->
            <div class="alert-banner" id="alertBanner">
                <div class="pulse-core"></div>
                <span id="bannerText"></span>
            </div>

            <!-- Секция описания проблемы -->
            <div class="incident-details">
                <h2 id="incTitle"></h2>
                
                <div class="meta-info">
                    <span>ID инцидента: <strong id="incID"></strong></span>
                    <span>Обновлено: <strong id="incTime"></strong></span>
                </div>

                <p class="incident-text" id="incMessage"></p>
            </div>

            <!-- Сетка 3-х серверов -->
            <p class="servers-section-title">Состояние узлов инфраструктуры</p>
            <div class="mini-servers-list">
                <div class="mini-server-badge">
                    <span id="name-node1"></span>
                    <div class="dot-indicator" id="dot-node1"></div>
                </div>
                <div class="mini-server-badge">
                    <span id="name-node2"></span>
                    <div class="dot-indicator" id="dot-node2"></div>
                </div>
                <div class="mini-server-badge">
                    <span id="name-node3"></span>
                    <div class="dot-indicator" id="dot-node3"></div>
                </div>
            </div>

        </div>
    </div>

    <!-- Автоматический конфигуратор темы -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const data = VPN_STATUS_CONFIG;
            
            // Сборка стилей контейнеров и баннера
            document.getElementById('mainPanel').className = `status-panel panel-${data.globalStatusType}`;
            document.getElementById('alertBanner').className = `alert-banner banner-${data.globalStatusType}`;
            document.getElementById('bannerText').innerText = data.bannerMessage;
            
            // Отрендерить тексты
            document.getElementById('incTitle').innerText = data.mainTitle;
            document.getElementById('incID').innerText = data.incidentID;
            document.getElementById('incTime').innerText = data.lastUpdatedTime;
            document.getElementById('incMessage').innerText = data.customMessage;

            // Назначить имена серверам
            document.getElementById('name-node1').innerText = data.serverNames.node1;
            document.getElementById('name-node2').innerText = data.serverNames.node2;
            document.getElementById('name-node3').innerText = data.serverNames.node3;

            // Подключить классы мигания точкам
            document.getElementById('dot-node1').className = `dot-indicator dot-${data.serverStatuses.node1Status}`;
            document.getElementById('dot-node2').className = `dot-indicator dot-${data.serverStatuses.node2Status}`;
            document.getElementById('dot-node3').className = `dot-indicator dot-${data.serverStatuses.node3Status}`;
        });
    </script>
</body>
</html>
