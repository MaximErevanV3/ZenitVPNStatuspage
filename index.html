<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenitVPN — Статус</title>
    <style>
        :root {
            --bg-dark: #020306;             
            --panel-surface: rgba(8, 11, 21, 0.65); 
            --border-base: rgba(255, 255, 255, 0.04); 
            --rgb-success: 0, 255, 170;     
            --rgb-warning: 255, 170, 0;     
            --rgb-danger: 255, 46, 81;      
            --rgb-info: 0, 183, 255;        
            --blink-speed: 1.4s;            
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { width: 100%; max-width: 700px; }
        .status-panel {
            background: var(--panel-surface); border: 1px solid var(--border-base); border-radius: 24px; padding: 45px;
            box-shadow: 0 40px 90px rgba(0, 0, 0, 0.7);
        }
        .panel-critical { border-color: rgba(var(--rgb-danger), 0.3); box-shadow: 0 40px 90px rgba(0, 0, 0, 0.7), 0 0 40px rgba(var(--rgb-danger), 0.05); }
        .panel-warning { border-color: rgba(var(--rgb-warning), 0.3); box-shadow: 0 40px 90px rgba(0, 0, 0, 0.7), 0 0 40px rgba(var(--rgb-warning), 0.05); }
        .panel-info { border-color: rgba(var(--rgb-info), 0.3); box-shadow: 0 40px 90px rgba(0, 0, 0, 0.7), 0 0 40px rgba(var(--rgb-info), 0.05); }
        .panel-success { border-color: rgba(var(--rgb-success), 0.2); box-shadow: 0 40px 90px rgba(0, 0, 0, 0.7), 0 0 40px rgba(var(--rgb-success), 0.03); }
        
        .logo { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 900; letter-spacing: 2px; margin-bottom: 35px; text-transform: uppercase; }
        .logo span { color: #fff; }
        .logo b { color: rgb(var(--rgb-info)); }

        .alert-banner { display: flex; align-items: center; gap: 14px; padding: 18px 24px; border-radius: 14px; font-weight: 800; font-size: 13px; margin-bottom: 35px; text-transform: uppercase; }
        .banner-critical { background: rgba(var(--rgb-danger), 0.05); color: rgb(var(--rgb-danger)); border: 1px solid rgba(var(--rgb-danger), 0.2); }

        .pulse-core { width: 8px; height: 8px; border-radius: 50%; background-color: currentColor; animation: fluidBlinkRed var(--blink-speed) infinite ease-in-out; }

        .incident-details h2 { font-size: 28px; font-weight: 800; margin-bottom: 12px; }
        .meta-info { font-size: 11px; color: #525a6c; display: flex; gap: 24px; margin-bottom: 28px; border-bottom: 1px solid rgba(255, 255, 255, 0.04); padding-bottom: 16px; text-transform: uppercase; }
        .meta-info strong { color: #f8fafc; }
        .incident-text { font-size: 15px; color: #94a3b8; line-height: 1.7; margin-bottom: 40px; white-space: pre-line; }

        .servers-section-title { font-size: 11px; color: #525a6c; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; margin-bottom: 15px; }
        .mini-servers-list { display: flex; gap: 14px; }
        .mini-server-badge { flex: 1; background: rgba(255, 255, 255, 0.01); border: 1px solid rgba(255, 255, 255, 0.03); padding: 16px 20px; border-radius: 14px; display: flex; align-items: center; justify-content: space-between; font-size: 13px; font-weight: 600; }
        .mini-server-badge span { color: #cbd5e1; }

        .dot-indicator { width: 8px; height: 8px; border-radius: 50%; }
        .dot-online { background-color: rgb(var(--rgb-success)); animation: fluidBlinkGreen var(--blink-speed) infinite ease-in-out; }
        .dot-warning { background-color: rgb(var(--rgb-warning)); animation: fluidBlinkYellow var(--blink-speed) infinite ease-in-out; }
        .dot-offline { background-color: rgb(var(--rgb-danger)); animation: fluidBlinkRed var(--blink-speed) infinite ease-in-out; }
        .dot-maintenance { background-color: rgb(var(--rgb-info)); animation: fluidBlinkBlue var(--blink-speed) infinite ease-in-out; }

        @keyframes fluidBlinkGreen {
            0%, 100% { box-shadow: 0 0 6px 1px rgb(var(--rgb-success)); opacity: 0.6; }
            50% { box-shadow: 0 0 16px 4px rgb(var(--rgb-success)); opacity: 1; }
        }
        @keyframes fluidBlinkYellow {
            0%, 100% { box-shadow: 0 0 6px 1px rgb(var(--rgb-warning)); opacity: 0.6; }
            50% { box-shadow: 0 0 16px 4px rgb(var(--rgb-warning)); opacity: 1; }
        }
        @keyframes fluidBlinkRed {
            0%, 100% { box-shadow: 0 0 6px 1px rgb(var(--rgb-danger)); opacity: 0.6; }
            50% { box-shadow: 0 0 16px 4px rgb(var(--rgb-danger)); opacity: 1; }
        }
        @keyframes fluidBlinkBlue {
            0%, 100% { box-shadow: 0 0 6px 1px rgb(var(--rgb-info)); opacity: 0.6; }
            50% { box-shadow: 0 0 16px 4px rgb(var(--rgb-info)); opacity: 1; }
        }
        @media (max-width: 600px) { .mini-servers-list { flex-direction: column; gap: 10px; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="status-panel" id="mainPanel">
            
            <div class="logo">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                <span>Zenit<b>VPN</b></span>
            </div>

            <div class="alert-banner" id="alertBanner">
                <div class="pulse-core"></div>
                <span id="bannerText"></span>
            </div>

            <div class="incident-details">
                <h2 id="incTitle"></h2>
                <div class="meta-info">
                    <span>ID операции: <strong id="incID"></strong></span>
                    <span>Обновлено: <strong id="incTime"></strong></span>
                </div>
                <p class="incident-text" id="incMessage"></p>
            </div>

            <p class="servers-section-title">Состояние узлов инфраструктуры</p>
            <div class="mini-servers-list">
                <div class="mini-server-badge"><span id="name-node1"></span><div class="dot-indicator" id="dot-node1"></div></div>
                <div class="mini-server-badge"><span id="name-node2"></span><div class="dot-indicator" id="dot-node2"></div></div>
                <div class="mini-server-badge"><span id="name-node3"></span><div class="dot-indicator" id="dot-node3"></div></div>
            </div>

        </div>
    </div>

    <script>
        /* ==========================================================================
           ГЛАВНЫЙ ТУМБЛЕР АДМИНИСТРАТОРА
           ========================================================================== */
        // Напишите 'success' — режим "Всё ок"
        // Напишите 'maintenance' — режим "Техработы"
        // Напишите 'critical' — режим "Авария"
        const CURRENT_SYSTEM_MODE = 'success'; 

        const VPN_STATUS_PRESETS = {
            success: {
                globalStatusType: 'success', bannerMessage: '', 
                mainTitle: 'Все системы работают штатно', incidentID: 'N/A',
                customMessage: 'Критических сбоев не зафиксировано. Магистральные каналы функционируют на максимальной пропускной способности. Сеть полностью стабильна.',
                serverStatuses: { node1Status: 'online', node2Status: 'online', node3Status: 'online' }
            },
            maintenance: {
                globalStatusType: 'info', bannerMessage: '', 
                mainTitle: 'Проводятся плановые технические работы', incidentID: '#MNT-404',
                customMessage: 'Проводим оптимизацию маршрутизации для улучшения стабильности протоколов. Узел в Нидерландах временно переведен в режим обслуживания.',
                serverStatuses: { node1Status: 'online', node2Status: 'maintenance', node3Status: 'online' }
            },
            critical: {
                globalStatusType: 'critical', bannerMessage: 'Глобальный технический инцидент сети',
                mainTitle: 'Авария на стороне магистрального провайдера', incidentID: '#ZNT-8840',
                customMessage: 'Зафиксировано аварийное отключение сетевых маршрутов. Франция полностью изолирована. В Нидерландах наблюдается потеря пакетов до 45%.\n\nРекомендуем вручную переключиться на Финляндию.',
                serverStatuses: { node1Status: 'online', node2Status: 'warning', node3Status: 'offline' }
            }
        };

        const VPN_SERVER_NAMES = { node1: 'Финляндия (Helsinki)', node2: 'Нидерланды (Amsterdam)', node3: 'Франция (Paris)' };

        function updateStatusDisplay() {
            const activeMode = CURRENT_SYSTEM_MODE;
            const data = VPN_STATUS_PRESETS[activeMode] || VPN_STATUS_PRESETS['success'];
            
            const formattedTime = new Date().toLocaleString('ru-RU', { day: '2digit', month: '2digit', year: 'numeric', hour: '2digit', minute: '2digit', timeZoneName: 'short' });

            const banner = document.getElementById('alertBanner');
            if (activeMode === 'success' || activeMode === 'maintenance') {
                banner.style.display = 'none'; 
            } else {
                banner.style.display = 'flex'; 
                banner.className = `alert-banner banner-${data.globalStatusType}`;
                document.getElementById('bannerText').innerText = data.bannerMessage;
            }

            document.getElementById('mainPanel').className = `status-panel panel-${data.globalStatusType}`;
            document.getElementById('incTitle').innerText = data.mainTitle;
            document.getElementById('incID').innerText = data.incidentID;
            document.getElementById('incTime').innerText = formattedTime;
            document.getElementById('incMessage').innerText = data.customMessage;
            
            document.getElementById('name-node1').innerText = VPN_SERVER_NAMES.node1;
            document.getElementById('name-node2').innerText = VPN_SERVER_NAMES.node2;
            document.getElementById('name-node3').innerText = VPN_SERVER_NAMES.node3;
            
            document.getElementById('dot-node1').className = `dot-indicator dot-${data.serverStatuses.node1Status}`;
            document.getElementById('dot-node2').className = `dot-indicator dot-${data.serverStatuses.node2Status}`;
            document.getElementById('dot-node3').className = `dot-indicator dot-${data.serverStatuses.node3Status}`;
        }

        document.addEventListener("DOMContentLoaded", () => {
            updateStatusDisplay();
            
            // Обновление времени каждую минуту
            setInterval(() => {
                const formattedTime = new Date().toLocaleString('ru-RU', { day: '2digit', month: '2digit', year: 'numeric', hour: '2digit', minute: '2digit', timeZoneName: 'short' });
                document.getElementById('incTime').innerText = formattedTime;
            }, 60000);
        });
    </script>
</body>
</html>
