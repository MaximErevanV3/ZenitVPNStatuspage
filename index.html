<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenitVPN — Статус Систем</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <script>
        /* ==========================================================================
           РАСШИРЕННАЯ JS-ПАНЕЛЬ АДМИНИСТРАТОРА (Редактируйте данные здесь)
           ========================================================================== */
        const VPN_STATUS_CONFIG = {
            // 1. Статус главного экрана: 'critical' (красный), 'warning' (желтый), 'info' (синий), 'success' (зеленый)
            globalStatusType: 'critical', 

            // 2. Текстовое наполнение блоков
            bannerMessage: 'Глобальный технический инцидент сети',
            mainTitle: 'Авария на стороне магистрального провайдера Tier-1',
            incidentID: '#ZNT-8840',
            lastUpdatedTime: '04.06.2026, 19:44 MSK',

            // 3. Основной текст уведомления (Любой ваш текст)
            customMessage: 'Зафиксировано аварийное отключение сетевых маршрутов на стыке европейских дата-центров. Проблема вызвана техническим сбоем на стороне вышестоящего провайдера связи.\n\nВ связи с этим узел во Франции полностью изолирован. На сервере в Нидерландах наблюдается критическая деградация каналов: потеря пакетов составляет до 45%, а пинг увеличен в 4 раза.\n\nЧто делать пользователям:\n1. Ручного переключитесь на сервер Финляндия — трафик этого узла идет по изолированной кабельной системе, он полностью стабилен.\n2. При возникновении проблем с подключением, активируйте альтернативные протоколы в настройках вашего приложения.\n\nНаши специалисты совместно с инженерами ДЦ уже занимаются перемаршрутизацией сессий.',

            // 4. Кастомизация отображения названий узлов
            serverNames: {
                node1: 'Финляндия (Helsinki)',
                node2: 'Нидерланды (Amsterdam)',
                node3: 'Франция (Paris)'
            },

            // 5. Текущие статусы мигания для каждого узла: 'online', 'warning', 'offline'
            serverStatuses: {
                node1Status: 'online',     
                node2Status: 'warning', 
                node3Status: 'offline'      
            }
        };
    </script>

    <div class="container">
        <div class="status-panel" id="mainPanel">
            
            <!-- Логотип -->
            <div class="logo">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-right:4px; color:rgb(var(--status-info-rgb));"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                Zenit<span>VPN</span>
            </div>

            <!-- Верхняя плашка -->
            <div class="alert-banner" id="alertBanner">
                <div class="pulse-core"></div>
                <span id="bannerText"></span>
            </div>

            <!-- Секция текстов -->
            <div class="incident-details">
                <h2 id="incTitle"></h2>
                
                <div class="meta-info">
                    <span>ID инцидента: <strong id="incID"></strong></span>
                    <span>Обновлено: <strong id="incTime"></strong></span>
                </div>

                <p class="incident-text" id="incMessage"></p>
            </div>

            <!-- Список серверов -->
            <p class="servers-section-title">Состояние узлов инфраструктуры</p>
            <div class="mini-servers-list">
                <div class="mini-server-badge">
                    <span id="name-node1">Загрузка...</span>
                    <div class="dot-indicator" id="dot-node1"></div>
                </div>
                <div class="mini-server-badge">
                    <span id="name-node2">Загрузка...</span>
                    <div class="dot-indicator" id="dot-node2"></div>
                </div>
                <div class="mini-server-badge">
                    <span id="name-node3">Загрузка...</span>
                    <div class="dot-indicator" id="dot-node3"></div>
                </div>
            </div>

        </div>
    </div>

    <!-- Автоматический конфигуратор страницы -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const data = VPN_STATUS_CONFIG;
            
            // Настройка главного контейнера и баннера
            document.getElementById('mainPanel').className = `status-panel panel-${data.globalStatusType}`;
            document.getElementById('alertBanner').className = `alert-banner banner-${data.globalStatusType}`;
            document.getElementById('bannerText').innerText = data.bannerMessage;
            
            // Заполнение текстовых полей
            document.getElementById('incTitle').innerText = data.mainTitle;
            document.getElementById('incID').innerText = data.incidentID;
            document.getElementById('incTime').innerText = data.lastUpdatedTime;
            document.getElementById('incMessage').innerText = data.customMessage;

            // Настройка названий локаций
            document.getElementById('name-node1').innerText = data.serverNames.node1;
            document.getElementById('name-node2').innerText = data.serverNames.node2;
            document.getElementById('name-node3').innerText = data.serverNames.node3;

            // Рендер статусов индикаторов
            const applyDotState = (domId, state) => {
                const element = document.getElementById(domId);
                element.className = `dot-indicator dot-${state}`;
            };

            applyDotState('dot-node1', data.serverStatuses.node1Status);
            applyDotState('dot-node2', data.serverStatuses.node2Status);
            applyDotState('dot-node3', data.serverStatuses.node3Status);
        });
    </script>
</body>
</html>
