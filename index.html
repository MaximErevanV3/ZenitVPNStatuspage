<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenitVPN — Статус Систем</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #04060f;
            --surface: rgba(8, 12, 26, 0.8);
            --surface-raised: rgba(255,255,255,0.03);
            --border: rgba(255,255,255,0.06);
            --border-strong: rgba(255,255,255,0.1);

            --green: #00dda0;
            --yellow: #ffb020;
            --red: #ff3358;
            --blue: #4da6ff;
            --purple: #a78bfa;

            --text-1: #eef2ff;
            --text-2: #8892aa;
            --text-3: #404866;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text-1);
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow-x: hidden;
        }

        /* ── Scanline texture ── */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.07) 2px,
                rgba(0,0,0,0.07) 4px
            );
            pointer-events: none;
            z-index: 0;
        }

        /* ── Background ── */
        .bg-layer {
            position: fixed; inset: 0;
            z-index: 0; pointer-events: none;
            overflow: hidden;
        }
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
        }
        .bg-orb-1 { width:700px;height:700px; background:rgba(77,166,255,0.055); top:-250px;left:-200px; }
        .bg-orb-2 { width:500px;height:500px; background:rgba(0,221,160,0.04); bottom:-200px;right:-100px; }
        .bg-orb-3 { width:300px;height:300px; background:rgba(167,139,250,0.035); top:40%;left:50%;transform:translateX(-50%); }

        .bg-grid {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image:
                linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 30%, transparent 100%);
        }

        /* ── Container ── */
        .container {
            width: 100%; max-width: 700px;
            position: relative; z-index: 1;
            animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) both;
        }
        @keyframes fadeUp {
            from { opacity:0; transform: translateY(18px); }
            to   { opacity:1; transform: translateY(0); }
        }

        /* ── Top bar (outside card) ── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding: 0 4px;
        }
        .logo {
            display: flex; align-items: center; gap: 9px;
        }
        .logo-shield {
            width: 28px; height: 28px;
            background: linear-gradient(135deg, rgba(77,166,255,0.18), rgba(77,166,255,0.06));
            border: 1px solid rgba(77,166,255,0.22);
            border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
            color: var(--blue);
        }
        .logo-name {
            font-size: 12.5px; font-weight: 800;
            letter-spacing: 2.5px; text-transform: uppercase;
            color: var(--text-1);
        }
        .logo-name b { color: var(--blue); }

        .topbar-right {
            display: flex; align-items: center; gap: 6px;
            font-size: 10.5px; font-family: 'JetBrains Mono', monospace;
            color: var(--text-3);
        }
        .live-dot {
            width: 5px; height: 5px; border-radius: 50%;
            background: var(--green);
            animation: livepulse 2.2s ease-in-out infinite;
        }
        @keyframes livepulse {
            0%,100% { opacity:.5; box-shadow: 0 0 0 0 rgba(0,221,160,0.5); }
            50%      { opacity:1; box-shadow: 0 0 0 4px rgba(0,221,160,0); }
        }

        /* ── Main Card ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            backdrop-filter: blur(60px);
            -webkit-backdrop-filter: blur(60px);
            overflow: hidden;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.025) inset,
                0 40px 100px rgba(0,0,0,0.7),
                0 8px 30px rgba(0,0,0,0.4);
            transition: border-color 0.5s ease, box-shadow 0.5s ease;
        }
        .card.theme-success  { border-color: rgba(0,221,160,0.14);  box-shadow: 0 40px 100px rgba(0,0,0,0.7), 0 0 80px rgba(0,221,160,0.04); }
        .card.theme-warning  { border-color: rgba(255,176,32,0.2);   box-shadow: 0 40px 100px rgba(0,0,0,0.7), 0 0 80px rgba(255,176,32,0.05); }
        .card.theme-critical { border-color: rgba(255,51,88,0.22);   box-shadow: 0 40px 100px rgba(0,0,0,0.7), 0 0 80px rgba(255,51,88,0.06); }
        .card.theme-info     { border-color: rgba(77,166,255,0.2);   box-shadow: 0 40px 100px rgba(0,0,0,0.7), 0 0 80px rgba(77,166,255,0.05); }

        /* ── Alert Banner (top strip of card) ── */
        .alert-strip {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 11px 28px;
            font-size: 11px; font-weight: 700;
            letter-spacing: 1.2px; text-transform: uppercase;
            border-bottom: 1px solid transparent;
        }
        .alert-strip.visible { display: flex; }
        .alert-strip.strip-critical {
            background: rgba(255,51,88,0.07);
            border-bottom-color: rgba(255,51,88,0.15);
            color: var(--red);
        }
        .alert-strip.strip-warning {
            background: rgba(255,176,32,0.07);
            border-bottom-color: rgba(255,176,32,0.15);
            color: var(--yellow);
        }
        .strip-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: currentColor; flex-shrink: 0;
            animation: pulse-strip 1.4s ease-in-out infinite;
        }
        @keyframes pulse-strip {
            0%,100% { opacity:.5; }
            50% { opacity:1; box-shadow: 0 0 8px 3px currentColor; }
        }

        /* ── Card Body ── */
        .card-body { padding: 32px 36px 28px; }

        /* ── Overall status pill ── */
        .status-pill {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 11px; font-weight: 700;
            letter-spacing: 0.8px; text-transform: uppercase;
            margin-bottom: 20px;
            border: 1px solid transparent;
        }
        .pill-success  { background: rgba(0,221,160,0.08);  border-color: rgba(0,221,160,0.18);  color: var(--green); }
        .pill-warning  { background: rgba(255,176,32,0.08); border-color: rgba(255,176,32,0.2);  color: var(--yellow); }
        .pill-critical { background: rgba(255,51,88,0.08);  border-color: rgba(255,51,88,0.2);   color: var(--red); }
        .pill-info     { background: rgba(77,166,255,0.08); border-color: rgba(77,166,255,0.2);  color: var(--blue); }
        .pill-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: currentColor;
            animation: livepulse 2s ease-in-out infinite;
        }

        .incident-title {
            font-size: 24px; font-weight: 800;
            line-height: 1.2; letter-spacing: -0.5px;
            color: var(--text-1);
            margin-bottom: 10px;
        }
        .incident-body {
            font-size: 13.5px; color: var(--text-2);
            line-height: 1.75; margin-bottom: 28px;
            white-space: pre-line;
            max-width: 560px;
        }

        /* ── Meta strip ── */
        .meta-strip {
            display: flex; gap: 0;
            background: var(--surface-raised);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 28px;
        }
        .meta-cell {
            flex: 1; padding: 12px 18px;
            border-right: 1px solid var(--border);
        }
        .meta-cell:last-child { border-right: none; }
        .meta-label {
            font-size: 9.5px; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase;
            color: var(--text-3); margin-bottom: 4px;
        }
        .meta-value {
            font-size: 12px; font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-2);
        }

        /* ── Servers ── */
        .servers-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 12px;
        }
        .servers-label {
            font-size: 10px; font-weight: 700;
            letter-spacing: 2px; text-transform: uppercase;
            color: var(--text-3);
        }
        .servers-count {
            font-size: 10px; font-family: 'JetBrains Mono', monospace;
            color: var(--text-3);
        }

        .servers-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 24px;
        }

        .server-card {
            background: var(--surface-raised);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s, background 0.3s;
            animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) both;
        }
        .server-card:nth-child(1) { animation-delay: 0.05s; }
        .server-card:nth-child(2) { animation-delay: 0.10s; }
        .server-card:nth-child(3) { animation-delay: 0.15s; }

        /* Thin top accent line per status */
        .server-card::after {
            content: '';
            position: absolute; top: 0; left: 0; right: 0;
            height: 1px;
        }
        .server-card.status-online::after    { background: linear-gradient(90deg, transparent, rgba(0,221,160,0.5), transparent); }
        .server-card.status-warning::after   { background: linear-gradient(90deg, transparent, rgba(255,176,32,0.5), transparent); }
        .server-card.status-offline::after   { background: linear-gradient(90deg, transparent, rgba(255,51,88,0.5), transparent); }
        .server-card.status-maintenance::after { background: linear-gradient(90deg, transparent, rgba(77,166,255,0.5), transparent); }

        .server-card.status-online      { border-color: rgba(0,221,160,0.12); }
        .server-card.status-warning     { border-color: rgba(255,176,32,0.18); background: rgba(255,176,32,0.025); }
        .server-card.status-offline     { border-color: rgba(255,51,88,0.18);  background: rgba(255,51,88,0.025); }
        .server-card.status-maintenance { border-color: rgba(77,166,255,0.18); background: rgba(77,166,255,0.025); }

        .server-top {
            display: flex; align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 14px;
        }
        .server-flag { font-size: 20px; line-height: 1; }
        .server-dot {
            width: 7px; height: 7px; border-radius: 50%; margin-top: 2px;
        }
        .status-online    .server-dot { background: var(--green);  animation: glow-g 1.8s ease-in-out infinite; }
        .status-warning   .server-dot { background: var(--yellow); animation: glow-y 1.4s ease-in-out infinite; }
        .status-offline   .server-dot { background: var(--red);    animation: glow-r 1.2s ease-in-out infinite; }
        .status-maintenance .server-dot { background: var(--blue); animation: glow-b 2s ease-in-out infinite; }

        @keyframes glow-g { 0%,100%{box-shadow:0 0 4px 1px rgba(0,221,160,0.4);opacity:.6}50%{box-shadow:0 0 10px 4px rgba(0,221,160,0.7);opacity:1} }
        @keyframes glow-y { 0%,100%{box-shadow:0 0 4px 1px rgba(255,176,32,0.4);opacity:.6}50%{box-shadow:0 0 10px 4px rgba(255,176,32,0.7);opacity:1} }
        @keyframes glow-r { 0%,100%{box-shadow:0 0 4px 1px rgba(255,51,88,0.4);opacity:.6}50%{box-shadow:0 0 10px 4px rgba(255,51,88,0.7);opacity:1} }
        @keyframes glow-b { 0%,100%{box-shadow:0 0 4px 1px rgba(77,166,255,0.4);opacity:.6}50%{box-shadow:0 0 10px 4px rgba(77,166,255,0.7);opacity:1} }

        .server-name {
            font-size: 12.5px; font-weight: 700;
            color: var(--text-1); margin-bottom: 2px;
        }
        .server-code {
            font-size: 10px; font-family: 'JetBrains Mono', monospace;
            color: var(--text-3);
        }

        /* Uptime bar */
        .uptime-bar-wrap {
            margin-top: 12px;
        }
        .uptime-bar-label {
            display: flex; justify-content: space-between;
            font-size: 9.5px; color: var(--text-3);
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 5px;
        }
        .uptime-bar-track {
            height: 3px;
            background: rgba(255,255,255,0.06);
            border-radius: 2px;
            overflow: hidden;
        }
        .uptime-bar-fill {
            height: 100%; border-radius: 2px;
            transition: width 1s cubic-bezier(0.22,1,0.36,1);
        }
        .status-online    .uptime-bar-fill { background: var(--green); width: 99.8%; }
        .status-warning   .uptime-bar-fill { background: var(--yellow); width: 81%; }
        .status-offline   .uptime-bar-fill { background: var(--red); width: 0%; }
        .status-maintenance .uptime-bar-fill { background: var(--blue); width: 100%; }

        .status-label-text {
            font-size: 10px; font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.3px; margin-top: 6px;
        }
        .status-online    .status-label-text { color: var(--green); }
        .status-warning   .status-label-text { color: var(--yellow); }
        .status-offline   .status-label-text { color: var(--red); }
        .status-maintenance .status-label-text { color: var(--blue); }

        /* ── Footer ── */
        .card-footer {
            padding: 14px 36px;
            border-top: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.15);
        }
        .footer-left {
            font-size: 10px; font-family: 'JetBrains Mono', monospace;
            color: var(--text-3);
        }
        .footer-right {
            display: flex; align-items: center; gap: 16px;
        }
        .footer-badge {
            display: flex; align-items: center; gap: 5px;
            font-size: 10px; font-family: 'JetBrains Mono', monospace;
            color: var(--text-3);
        }
        .footer-badge-dot {
            width: 5px; height: 5px; border-radius: 50%;
        }

        @media (max-width: 580px) {
            .card-body { padding: 24px 20px 20px; }
            .card-footer { padding: 12px 20px; }
            .servers-grid { grid-template-columns: 1fr; }
            .incident-title { font-size: 20px; }
            .meta-strip { flex-direction: column; }
            .meta-cell { border-right: none; border-bottom: 1px solid var(--border); }
            .meta-cell:last-child { border-bottom: none; }
            .topbar { flex-direction: column; align-items: flex-start; gap: 8px; }
        }
    </style>
</head>

<div class="bg-layer">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>

<div class="bg-grid"></div>

<!-- =====================================================
     ТУМБЛЕР РЕЖИМА — ИЗМЕНИТЬ ЗДЕСЬ
     'success' | 'maintenance' | 'critical' | 'warning'
     ===================================================== -->
<script>
    const CURRENT_SYSTEM_MODE = 'success';

    const PRESETS = {
        success: {
            theme: 'success',
            pill: { cls: 'pill-success', text: 'Все системы работают' },
            banner: null,
            title: 'Инфраструктура в норме',
            id: '—',
            message: 'Критических сбоев и плановых технических работ не зафиксировано. Все магистральные каналы функционируют на максимальной пропускной способности.',
            nodes: { node1: 'online', node2: 'online', node3: 'online' }
        },
        maintenance: {
            theme: 'info',
            pill: { cls: 'pill-info', text: 'Техническое обслуживание' },
            banner: null,
            title: 'Плановые технические работы',
            id: '#MNT-404',
            message: 'Инженеры проводят модернизацию серверного ПО и оптимизацию таблиц маршрутизации. Узел в Нидерландах временно переведён в режим обслуживания.',
            nodes: { node1: 'online', node2: 'maintenance', node3: 'online' }
        },
        critical: {
            theme: 'critical',
            pill: { cls: 'pill-critical', text: 'Критический сбой' },
            banner: { cls: 'strip-critical', text: 'Зафиксирован критический сбой' },
            title: 'Аварийное отключение узла',
            id: '#ZNT-0001',
            message: 'Узел в Финляндии недоступен. Трафик перенаправлен на резервные серверы. Инженеры устанавливают причину инцидента.',
            nodes: { node1: 'offline', node2: 'online', node3: 'online' }
        },
        warning: {
            theme: 'warning',
            pill: { cls: 'pill-warning', text: 'Повышенная нагрузка' },
            banner: { cls: 'strip-warning', text: 'Повышенная нагрузка на сеть' },
            title: 'Замедление сетевых узлов',
            id: '#ZNT-0002',
            message: 'Зафиксирована повышенная нагрузка на все три узла. Возможны замедления и кратковременная недоступность серверов.',
            nodes: { node1: 'warning', node2: 'warning', node3: 'warning' }
        }
    };

    const NODE_NAMES = {
        node1: { name: 'Финляндия', code: 'HEL-1', flag: '🇫🇮' },
        node2: { name: 'Нидерланды', code: 'AMS-1', flag: '🇳🇱' },
        node3: { name: 'Франция',    code: 'PR-1', flag: '🇫🇷' }
    };

    const STATUS_LABELS = {
        online:      'Online',
        offline:     'Offline',
        warning:     'Degraded',
        maintenance: 'Maintenance'
    };

    const UPTIME_VALUES = {
        online:      '99.8%',
        offline:     '0.0%',
        warning:     '81.3%',
        maintenance: '100%'
    };
</script>

<div class="container">

    <!-- Top bar outside card -->
    <div class="topbar">
        <div class="logo">
            <div class="logo-shield">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
            </div>
            <div class="logo-name">Zenit<b>VPN</b></div>
        </div>
        <div class="topbar-right">
            <div class="live-dot"></div>
            <span id="topTime"></span>
        </div>
    </div>

    <div class="card" id="mainCard">

        <!-- Alert strip (top of card) -->
        <div class="alert-strip" id="alertStrip">
            <div class="strip-dot"></div>
            <span id="stripText"></span>
        </div>

        <!-- Body -->
        <div class="card-body">

            <div class="status-pill" id="statusPill">
                <div class="pill-dot"></div>
                <span id="pillText"></span>
            </div>

            <h1 class="incident-title" id="incTitle"></h1>
            <p class="incident-body" id="incBody"></p>

            <!-- Meta cells -->
            <div class="meta-strip">
                <div class="meta-cell">
                    <div class="meta-label">ID инцидента</div>
                    <div class="meta-value" id="incID"></div>
                </div>
                <div class="meta-cell">
                    <div class="meta-label">Обновлено</div>
                    <div class="meta-value" id="incTime"></div>
                </div>
                <div class="meta-cell">
                    <div class="meta-label">Всего узлов</div>
                    <div class="meta-value">3 / 3</div>
                </div>
            </div>

            <!-- Servers -->
            <div class="servers-header">
                <span class="servers-label">Состояние узлов</span>
                <span class="servers-count" id="nodesOnlineCount"></span>
            </div>
            <div class="servers-grid" id="serversGrid"></div>
        </div>

        <!-- Footer -->
        <div class="card-footer">
            <span class="footer-left">ZenitVPN Монитор </span>
            <div class="footer-right">
                <div class="footer-badge">
                    <div class="footer-badge-dot" style="background:var(--green); animation: glow-g 2s ease-in-out infinite;"></div>
                    <span>Автообновление</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const mode = CURRENT_SYSTEM_MODE;
        const data = PRESETS[mode] || PRESETS.success;

        const now = new Date();
        const timeStr = now.toLocaleString('ru-RU', {
            day:'2-digit', month:'2-digit', year:'numeric',
            hour:'2-digit', minute:'2-digit'
        });
        document.getElementById('topTime').textContent = timeStr;

        // Card theme
        document.getElementById('mainCard').className = `card theme-${data.theme}`;

        // Alert strip
        const strip = document.getElementById('alertStrip');
        if (data.banner) {
            strip.classList.add('visible', data.banner.cls);
            document.getElementById('stripText').textContent = data.banner.text;
        }

        // Status pill
        const pill = document.getElementById('statusPill');
        pill.className = `status-pill ${data.pill.cls}`;
        document.getElementById('pillText').textContent = data.pill.text;

        // Text
        document.getElementById('incTitle').textContent = data.title;
        document.getElementById('incBody').textContent  = data.message;
        document.getElementById('incID').textContent    = data.id;
        document.getElementById('incTime').textContent  = timeStr;

        // Online count
        const onlineCount = Object.values(data.nodes).filter(s => s === 'online').length;
        document.getElementById('nodesOnlineCount').textContent = `${onlineCount} из 3 онлайн`;

        // Build server cards
        const grid = document.getElementById('serversGrid');
        Object.entries(data.nodes).forEach(([id, status]) => {
            const node = NODE_NAMES[id];
            const card = document.createElement('div');
            card.className = `server-card status-${status}`;
            card.innerHTML = `
                <div class="server-top">
                    <div class="server-flag">${node.flag}</div>
                    <div class="server-dot"></div>
                </div>
                <div class="server-name">${node.name}</div>
                <div class="server-code">${node.code}</div>
                <div class="uptime-bar-wrap">
                    <div class="uptime-bar-label">
                        <span>uptime</span>
                        <span>${UPTIME_VALUES[status]}</span>
                    </div>
                    <div class="uptime-bar-track">
                        <div class="uptime-bar-fill"></div>
                    </div>
                </div>
                <div class="status-label-text">${STATUS_LABELS[status]}</div>
            `;
            grid.appendChild(card);
        });
    });
</script>

</body>
    </html>
