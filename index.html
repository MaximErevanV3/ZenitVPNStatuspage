<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenitVPN — Мониторинг систем</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Размытый задний фон -->
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <script>
        /* ==========================================================================
           АДМИН-ПАНЕЛЬ НАСТРОЙКИ (Ваш текст и конфигурация)
           ========================================================================== */
        const VPN_INCIDENT_CONFIG = {
            // Тип инцидента: 'critical' (красный), 'warning' (желтый), 'info' (синий), 'success' (зеленый)
            statusType: 'critical', 

            // Текст внутри верхнего цветного баннера
            bannerTitle: 'Глобальный инцидент сети',

            // Главный заголовок сообщения аварии
            incidentTitle: 'Критический сбой на стороне магистрального провайдера',

            // Мета-данные
            incidentID: '#ZNT-7749',
            incidentTime: '04.06.2026, 19:40 MSK',

            // ГОТОВЫЙ ШАБЛОН ДЛЯ КРАСНОГО УВЕДОМЛЕНИЯ (Используйте \n для переноса строк)
            incidentMessage: 'Зафиксировано аварийное отключение сетевых маршрутов на стыке европейских дата-центров. Проблема вызвана техническим сбоем на стороне вышестоящего магистрального провайдера уровня Tier-1. \n\nВ связи с этим узел во Франции полностью изолирован. На сервере в Нидерландах наблюдается критическая деградация аплинков: потеря пакетов составляет до 45%, а пинг увеличен в 4 раза.\n\nЧто делать пользователям:\n1. Не используйте автоматический выбор локации в приложении.\n2. Вручную переключитесь на сервер Финляндия — трафик этого узла идет по изолированной кабельной системе, он стабилен.\n3. Если подключение не устанавливается, активируйте резервный протокол Shadowsocks/VLESS в настройках клиента.\n\nНаши специалисты совместно с инженерами ДЦ уже занимаются перемаршрутизацией сессий.',

            // Настройка статуса и мигания узлов: 'online', 'warning', 'offline'
            servers: {
                finland: 'online',     
                netherlands: 'warning', 
                france: 'offline'      
            }
        };
    </script>

    <div class="container">
        <div class="status-panel" id="mainPanel">
            
            <!-- Логотип сервиса -->
            <div class="logo">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-right:2px; color:var(--clr-info);"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                Zenit<span>VPN</span>
            </div>

            <!-- Информационный баннер -->
            <div class="alert-banner" id="alertBanner">
                <div class="pulse"></div>
                <span id="bannerText"></span>
            </div>

            <!-- Контентная зона -->
            <div class="incident-details">
                <h2 id="incTitle"></h2>
                
                <div class="meta-info">
                    <span>ID инцидента: <strong id="incID"></strong></span>
                    <span>Обновлено: <strong id="incTime"></strong></span>
                </div>

                <p class="incident-text" id="incMessage"></p>
            </div>

            <!-- Узлы VPN с новыми динамическими индикаторами -->
            <p class="servers-section-title">Состояние узлов инфраструктуры</p>
            <div class="mini-servers-list">
                <div class="mini-server-badge">
                    <span>Финляндия</span>
                    <div class="dot-indicator" id="dot-finland"></div>
                </div>
                <div class="mini-server-badge">
                    <span>Нидерланды</span>
                    <div class="dot-indicator" id="dot-netherlands"></div>
                </div>
                <div class="mini-server-badge">
                    <span>Франция</span>
                    <div class="dot-indicator" id="dot-france"></div>
                </div>
            </div>

        </div>
    </div>

    <!-- Автоматический конфигуратор -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const cfg = VPN_INCIDENT_CONFIG;
            
            document.getElementById('mainPanel').className = `status-panel panel-${cfg.statusType}`;
            document.getElementById('alertBanner').className = `alert-banner banner-${cfg.statusType}`;
            document.getElementById('bannerText').innerText = cfg.bannerTitle;
            
            document.getElementById('incTitle').innerText = cfg.incidentTitle;
            document.getElementById('incID').innerText = cfg.incidentID;
            document.getElementById('incTime').innerText = cfg.incidentTime;
            document.getElementById('incMessage').innerText = cfg.incidentMessage;

            const applyStatus = (id, status) => {
                const dot = document.getElementById(`dot-${id}`);
                dot.className = `dot-indicator dot-${status}`;
            };

            applyStatus('finland', cfg.servers.finland);
            applyStatus('netherlands', cfg.servers.netherlands);
            applyStatus('france', cfg.servers.france);
        });
    </script>
</body>
</html>
